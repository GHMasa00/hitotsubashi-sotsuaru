<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>思い出アルバム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Shippori+Mincho:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>
<style>
/* ══════════════════════════════════════
   CSS変数・リセット
══════════════════════════════════════ */
:root {
  --gold:#c9a84c; --gold-l:#e8d5a3; --gold-d:#9a7a2a;
  --bg:#1a1208; --bg2:#2a1f0e; --bg3:#3a2c14;
  --cream:#f5f0e8; --warm:#faf7f2;
  --sepia:#8b6f47; --sepia-d:#5c4a2a;
  --ink:#1a1208; --faded:#a09070;
  --red:#c05050; --green:#4a8a4a; --blue:#3a7ab0;
  --safe-t:env(safe-area-inset-top);
  --safe-b:env(safe-area-inset-bottom);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;}body{min-height:100%;}
body{background:var(--bg);font-family:'Noto Serif JP',serif;color:var(--ink);}

/* ══════════════════════════════════════
   共通ユーティリティ
══════════════════════════════════════ */
.screen{display:none;}
.screen.on{display:block;}
#viewScreen.on{display:block;min-height:100vh;}
#adminScreen.on{display:block;min-height:100vh;}
.btn{background:transparent;border:1px solid rgba(201,168,76,.4);border-radius:8px;color:var(--gold-l);font-family:'Noto Serif JP',serif;font-size:.85rem;padding:.55rem 1rem;cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn:active{background:rgba(201,168,76,.15);}
.btn.prim{background:var(--gold);border-color:var(--gold);color:var(--bg);font-weight:600;}
.btn.prim:active{background:var(--gold-l);}
.btn.dng{border-color:rgba(192,64,64,.4);color:var(--red);}
.btn.dng:active{background:rgba(192,64,64,.1);}
.btn.full{width:100%;justify-content:center;display:flex;align-items:center;gap:.5rem;}
input,textarea{font-family:'Noto Serif JP',serif;font-size:16px;-webkit-text-size-adjust:100%;}

/* ローディング */
#loading{position:fixed;inset:0;z-index:900;background:rgba(10,7,2,.88);backdrop-filter:blur(6px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:1rem;pointer-events:none;}
#loading.on{display:flex;pointer-events:auto;}
.spin{width:44px;height:44px;border:3px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{color:var(--gold-l);font-size:.88rem;letter-spacing:.08em;}

/* ═══════════════════════════════════════
   画面: パスワード入力
═══════════════════════════════════════ */
#pwScreen{
  background:linear-gradient(160deg,var(--bg),var(--bg2) 60%,var(--bg3));
  flex-direction:column;align-items:center;justify-content:flex-start;
  padding:3rem 1.5rem 3rem;padding-top:calc(3rem + var(--safe-t));min-height:100vh;gap:1.2rem;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
#pwScreen.on{display:flex;}
.pw-crest-img{width:90px;height:auto;filter:drop-shadow(0 2px 16px rgba(201,168,76,.6));}
.pw-logo{font-family:'Shippori Mincho',serif;font-size:2rem;font-weight:800;color:var(--gold-l);letter-spacing:.2em;text-shadow:0 2px 24px rgba(201,168,76,.4);}
.pw-logo span{color:var(--gold);}
.pw-school{color:var(--gold);font-size:.85rem;letter-spacing:.1em;}
.pw-line{width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.pw-field{display:flex;flex-direction:column;gap:.6rem;width:100%;max-width:280px;}
#pwInput{background:rgba(245,240,232,.08);border:1.5px solid rgba(201,168,76,.35);border-radius:8px;padding:.85rem 1.1rem;color:var(--cream);outline:none;letter-spacing:.1em;text-align:center;transition:border-color .2s;width:100%;}
#pwInput:focus{border-color:var(--gold);}
#pwEnterBtn{background:var(--gold);border:none;border-radius:8px;padding:.85rem;color:var(--bg);font-family:'Shippori Mincho',serif;font-size:1rem;font-weight:600;letter-spacing:.15em;cursor:pointer;}

/* ═══════════════════════════════════════
   閲覧画面
═══════════════════════════════════════ */
.sp-header{background:linear-gradient(180deg,var(--bg),var(--bg2));border-bottom:2px solid var(--gold);padding:1rem 1rem .75rem;padding-top:calc(1rem + var(--safe-t));text-align:center;position:relative;}
.sp-header h1{font-family:'Shippori Mincho',serif;font-size:1.4rem;font-weight:800;color:var(--gold-l);letter-spacing:.2em;}
.search-bar{position:sticky;top:0;z-index:50;background:var(--bg2);padding:.6rem .75rem;display:flex;gap:.5rem;align-items:center;}
#viewSearch{flex:1;background:rgba(245,240,232,.08);border:1px solid rgba(201,168,76,.25);border-radius:20px;padding:.5rem .9rem;color:var(--cream);outline:none;}

.class-grid{display:flex;flex-direction:column;gap:.75rem;padding:.85rem .75rem 1.5rem;}
.class-card{background:var(--warm);border-radius:8px;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,.45);cursor:pointer;}
.class-thumb{position:relative;width:100%;aspect-ratio:3/2;background:#1a1208;}
.class-thumb img{width:100%;height:100%;object-fit:contain;}
.class-label{padding:.65rem .75rem;display:flex;align-items:center;justify-content:center;}
.class-name{font-family:'Shippori Mincho',serif;font-size:1rem;font-weight:600;color:var(--sepia-d);}

.grid-wrap{padding:.75rem .6rem 7rem;}
.photo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.6rem;}
.photo-card{background:var(--warm);border-radius:6px;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,.45);}
.img-wrap{position:relative;aspect-ratio:3/4;overflow:hidden;background:#c8bca8;}
.img-wrap img{width:100%;height:100%;object-fit:cover;}
.card-info{padding:.5rem .55rem .6rem;}
.c-name{font-family:'Shippori Mincho',serif;font-size:.88rem;font-weight:600;color:var(--sepia-d);}
.c-yomi{font-size:.65rem;color:var(--faded);margin-top:.05rem;}
.nick-badge{display:inline-block;background:rgba(139,111,71,.12);border-radius:10px;padding:.05rem .4rem;font-size:.68rem;color:var(--sepia);margin-right:2px;}

/* ═══════════════════════════════════════
   クラスページ & ズーム
═══════════════════════════════════════ */
#classPage{background:var(--bg);min-height:100vh;}
.cp-header{background:linear-gradient(180deg,var(--bg),var(--bg2));border-bottom:2px solid var(--gold);padding:.85rem 1rem;padding-top:calc(.85rem + var(--safe-t));display:flex;align-items:center;gap:.75rem;position:sticky;top:0;z-index:50;}
.cp-back{background:none;border:none;color:var(--gold);font-size:1.3rem;cursor:pointer;}
.cp-search-bar{background:var(--bg2);padding:.6rem .75rem;}
.cp-search-bar input{width:100%;background:rgba(245,240,232,.08);border:1px solid rgba(201,168,76,.25);border-radius:20px;padding:.5rem .9rem;color:var(--cream);outline:none;}
.scan-block{margin-bottom:1.5rem;}
.scan-img-wrap{position:relative;width:100%;background:#1a1208;box-shadow:0 4px 16px rgba(0,0,0,.5);}
.scan-img-wrap img{width:100%;height:auto;display:block;}
.name-pins{position:absolute;inset:0;pointer-events:none;}
.name-pin{position:absolute;transform:translate(-50%,-50%);pointer-events:auto;}
.name-pin-dot{width:40px;height:40px;border-radius:50%;}
.highlight-canvas{position:absolute;top:0;left:0;pointer-events:none;}

.zoom-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(10,7,2,.92);backdrop-filter:blur(8px);align-items:center;justify-content:center;}
.zoom-overlay.on{display:flex;}
.zoom-inner{display:flex;flex-direction:column;align-items:center;gap:1rem;}
.zoom-img-wrap{width:min(350px,85vw);aspect-ratio:0.85;border-radius:8px;overflow:hidden;background:#1a1208;}
.zoom-name{font-family:'Shippori Mincho',serif;font-size:1.3rem;color:var(--gold-l);}
.zoom-yomi{font-size:.8rem;color:var(--faded);}

/* ボトムナビ */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:60;background:var(--bg2);border-top:1px solid rgba(201,168,76,.2);display:none;padding-bottom:var(--safe-b);}
.bottom-nav.on{display:flex;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:.55rem 0;color:rgba(160,144,112,.55);background:none;border:none;}

/* トースト */
#toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:rgba(42,31,14,.95);color:#e8d5a3;padding:.5rem 1.2rem;border-radius:20px;font-size:.8rem;z-index:999;opacity:0;transition:opacity .3s;}

::-webkit-scrollbar{display:none;}
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <div class="load-txt" id="loadTxt">読み込み中...</div>
</div>

<div id="pwScreen" class="screen on">
  <div class="pw-crest"><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAaMAAAFACAYAAAARRRPY..." alt="校章" class="pw-crest-img"></div>
  <div class="pw-line"></div>
  <div class="pw-logo">思い出<span>アルバム</span></div>
  <div id="pwSchoolName" class="pw-school"></div>
  <div class="pw-field">
    <input id="pwInput" type="text" placeholder="パスワードを入力" autocomplete="off">
    <button id="pwEnterBtn">開く</button>
    <div id="pwErr" style="color:var(--red);font-size:.78rem;text-align:center;"></div>
  </div>
</div>

<div id="viewScreen" class="screen">
  <div class="sp-header">
    <h1>思い出<span>アルバム</span></h1>
    <p id="viewSchoolLabel"></p>
  </div>
  <div class="search-bar">
    <input id="viewSearch" type="search" placeholder="🔍 名前・ふりがな・あだ名で検索">
  </div>
  <div class="class-grid" id="classGrid">
    <script>
      for(let i=1; i<=7; i++) {
        document.write(`
          <div class="class-card" onclick="openClassPage(${i})">
            <div class="class-thumb"><div style="color:var(--gold);text-align:center;padding-top:20%;">📷 3年${i}組</div></div>
            <div class="class-label"><span class="class-name">3年${i}組</span></div>
          </div>
        `);
      }
    </script>
  </div>
  <div class="grid-wrap" style="display:none">
    <div class="photo-grid" id="viewGrid"></div>
  </div>
</div>

<div id="classPage" class="screen">
  <div class="cp-header">
    <button class="cp-back" onclick="showScreen('viewScreen')">‹ 戻る</button>
    <span class="cp-title" id="cpTitle"></span>
  </div>
  <div class="cp-search-bar">
    <input id="cpSearch" type="search" placeholder="🔍 このクラス内を検索（ふりがな可）">
  </div>
  <div class="cp-body" id="cpBody"></div>
</div>

<div id="zoomOverlay" class="zoom-overlay" onclick="this.classList.remove('on')">
  <div class="zoom-inner">
    <div class="zoom-img-wrap" id="zoomImgWrap"></div>
    <div class="zoom-name" id="zoomName"></div>
    <div class="zoom-yomi" id="zoomYomi"></div>
    <div id="zoomNickBadges"></div>
  </div>
</div>

<nav class="bottom-nav" id="viewNav">
  <button class="nav-item"><span>☰</span><span style="font-size:.6rem">メニュー</span></button>
</nav>

<script>
// ── 設定 ────────────────────────────────────────────────
const GAPI_CLIENT_ID = '1060250626561-rs6tnhuhvr61qorkdhkitp6bnki12dn1.apps.googleusercontent.com';
const NICK_SHEET_ID  = '1UJB78CQ7fjbWfZkGD6FrfJ2wueInJKErZdtn4Tjh6Wo';

const config = {
  schoolName: '千代田区立一橋中学校',
  year: '1990年',
  viewPw: 'Hitotsubashi1990',
  adminPw: 'Check1990'
};

let isAdminLoggedIn = false;
let accessToken = null;

const $ = id => document.getElementById(id);

// ── 画面切り替え ────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  $(id).classList.add('on');
  if(id === 'viewScreen') $('viewNav').classList.add('on');
  else $('viewNav').classList.remove('on');
}

// ── パスワード認証 ──────────────────────────────────────
$('pwEnterBtn').onclick = () => {
  const v = $('pwInput').value.trim();
  if(v === config.viewPw || v === config.adminPw) {
    isAdminLoggedIn = (v === config.adminPw);
    $('viewSchoolLabel').textContent = `${config.schoolName} ${config.year}卒業`;
    showScreen('viewScreen');
    initGAPI();
  } else {
    $('pwErr').textContent = 'パスワードが違います';
  }
};

// ── Google API & データ取得 ─────────────────────────────
async function initGAPI() {
  gapi.load('client', async () => {
    await gapi.client.init({ discoveryDocs: ["https://sheets.googleapis.com/$discovery/rest?version=v4"] });
    // 閲覧者でもシートの読み取りはAPIキーなしの公開フェッチで行う
    fetchNicksFromSheet();
  });
}

async function fetchNicksFromSheet() {
  const classNums = [1,2,3,4,5,6,7];
  for(const cls of classNums) {
    const sheetName = encodeURIComponent(`3年${cls}組`);
    const url = `https://docs.google.com/spreadsheets/d/${NICK_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;
    try {
      const res = await fetch(url);
      const text = await res.text();
      const rows = parseCSV(text);
      rows.forEach(row => {
        const name = row[2]; // C列
        const nick = row[3]; // D列
        const yomi = row[4]; // E列: ふりがな
        if(!name || name === '名前') return;

        // CLASS_COORDSにデータを注入
        const coords = CLASS_COORDS[cls];
        if(coords) {
          ['page1', 'page2'].forEach(pKey => {
            const person = coords[pKey]?.find(p => p.name === name);
            if(person) {
              person.nick = nick || '';
              person.yomi = yomi || ''; // ふりがな保持
            }
          });
        }
      });
    } catch(e) { console.error(e); }
  }
}

function parseCSV(text) {
  return text.split('\n').map(row => row.split(',').map(cell => cell.replace(/"/g, '')));
}

// ── 検索ロジック (ふりがな対応) ─────────────────────────
function searchClassCoords(q) {
  const results = [];
  if(!q) return results;
  for(let cls=1; cls<=7; cls++){
    const coords = CLASS_COORDS[cls];
    if(!coords) continue;
    ['page1','page2'].forEach((pageKey, pi) => {
      (coords[pageKey]||[]).forEach(person => {
        const name = person.name || '';
        const nick = person.nick || '';
        const yomi = person.yomi || ''; // ふりがな
        // 名前、あだ名、ふりがなのいずれかにヒット
        if(name.includes(q) || nick.includes(q) || yomi.includes(q)) {
          results.push({ ...person, classNum: cls, pageIndex: pi });
        }
      });
    });
  }
  return results;
}

// ── UI生成 ──────────────────────────────────────────────
function openClassPage(classNum, focusPerson) {
  $('cpTitle').textContent = `3年${classNum}組`;
  const body = $('cpBody');
  body.innerHTML = '';
  
  const scans = CLASS_SCANS[classNum];
  const coords = CLASS_COORDS[classNum];

  ['page1','page2'].forEach((pageKey, pi) => {
    const scan = scans[pi];
    const pins = coords[pageKey] || [];
    const block = document.createElement('div');
    block.className = 'scan-block';
    block.innerHTML = `
      <div class="scan-img-wrap" id="scanWrap${pi}">
        <img src="https://drive.google.com/thumbnail?id=${scan.fileId}&sz=w1600" onload="attachPins(${pi}, ${scan.w}, ${scan.h}, ${JSON.stringify(pins).replace(/"/g,'&quot;')}, ${classNum})">
        <div class="name-pins" id="pins${pi}"></div>
      </div>`;
    body.appendChild(block);
  });
  showScreen('classPage');
}

function attachPins(pi, origW, origH, pins, classNum) {
  const wrap = $(`scanWrap${pi}`);
  const img = wrap.querySelector('img');
  const pinsEl = $(`pins${pi}`);
  const scaleX = img.offsetWidth / origW;
  const scaleY = img.offsetHeight / origH;

  pins.forEach(p => {
    const pin = document.createElement('div');
    pin.className = 'name-pin';
    pin.style.left = (p.x * scaleX) + 'px';
    pin.style.top = (p.y * scaleY) + 'px';
    pin.innerHTML = `<div class="name-pin-dot"></div>`;
    pin.onclick = (e) => {
      e.stopPropagation();
      openZoom(p, img.src, origW, origH, p.x * scaleX, p.y * scaleY, img.offsetWidth);
    };
    pinsEl.appendChild(pin);
  });
}

function openZoom(person, imgSrc, origW, origH, px, py, dispW) {
  const range = person.type === 'teacher' ? 270 : 230;
  const dispWPx = 350;
  const scale = dispWPx / (range * 2);
  
  const bgSize = `${origW * scale}px ${origH * scale}px`;
  const bgX = -( (px / (dispW/origW)) * scale - dispWPx / 2);
  const bgY = -( (py / (dispW/origW)) * scale - (dispWPx*0.85) / 2);

  $('zoomImgWrap').innerHTML = `<div style="width:100%;height:100%;background-image:url('${imgSrc}');background-size:${bgSize};background-position:${bgX}px ${bgY}px;"></div>`;
  $('zoomName').textContent = person.name;
  $('zoomYomi').textContent = person.yomi || ''; // ふりがな表示
  $('zoomNickBadges').innerHTML = (person.nick||'').split(',').filter(Boolean).map(n => `<span class="nick-badge">「${n}」</span>`).join('');
  $('zoomOverlay').classList.add('on');
}

// 検索入力イベント
$('viewSearch').oninput = (e) => {
  const q = e.target.value.trim();
  const grid = $('viewGrid');
  const gridWrap = document.querySelector('.grid-wrap');
  if(!q) {
    gridWrap.style.display = 'none';
    $('classGrid').style.display = 'flex';
    return;
  }
  $('classGrid').style.display = 'none';
  gridWrap.style.display = 'block';
  grid.innerHTML = '';
  
  const results = searchClassCoords(q);
  results.forEach(p => {
    const card = document.createElement('div');
    card.className = 'photo-card';
    card.innerHTML = `
      <div class="img-wrap"><div style="padding:20px;color:white;">📚</div></div>
      <div class="card-info">
        <div class="c-name">${p.name}</div>
        <div class="c-yomi">${p.yomi || ''}</div>
        <div class="c-nick">${(p.nick||'').split(',').filter(Boolean).map(n=>`<span class="nick-badge">${n}</span>`).join('')}</div>
      </div>`;
    card.onclick = () => openClassPage(p.classNum);
    grid.appendChild(card);
  });
};

// ── データ定数 (抜粋) ──────────────────────────────────
const CLASS_SCANS = { /* 既存のIDリスト */ };
const CLASS_COORDS = { /* 既存の座標リスト */ };
// ※ ここに提供いただいた座標データを流し込みます。

$('pwSchoolName').textContent = `${config.schoolName} ${config.year}卒業`;

</script>
</body>
</html>
