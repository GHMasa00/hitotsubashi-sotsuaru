<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>思い出アルバム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Shippori+Mincho:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>
<style>
/* ══════════════════════════════════════
   CSS変数・リセット
══════════════════════════════════════ */
:root {
  --gold:#c9a84c; --gold-l:#e8d5a3; --gold-d:#9a7a2a;
  --bg:#1a1208; --bg2:#2a1f0e; --bg3:#3a2c14;
  --cream:#f5f0e8; --warm:#faf7f2;
  --sepia:#8b6f47; --sepia-d:#5c4a2a;
  --ink:#1a1208; --faded:#a09070;
  --red:#c05050; --green:#4a8a4a; --blue:#3a7ab0;
  --safe-t:env(safe-area-inset-top);
  --safe-b:env(safe-area-inset-bottom);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{background:var(--bg);font-family:'Noto Serif JP',serif;color:var(--ink);position:fixed;width:100%;overflow:hidden;}

/* ══════════════════════════════════════
   共通ユーティリティ
══════════════════════════════════════ */
.screen{position:fixed;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;}
.screen.on{display:block;}
#setupScreen.on{display:flex;}
#pwScreen.on{display:flex;}
.btn{background:transparent;border:1px solid rgba(201,168,76,.4);border-radius:8px;color:var(--gold-l);font-family:'Noto Serif JP',serif;font-size:.85rem;padding:.55rem 1rem;cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn:active{background:rgba(201,168,76,.15);}
.btn.prim{background:var(--gold);border-color:var(--gold);color:var(--bg);font-weight:600;}
.btn.prim:active{background:var(--gold-l);}
.btn.dng{border-color:rgba(192,64,64,.4);color:var(--red);}
.btn.dng:active{background:rgba(192,64,64,.1);}
.btn.full{width:100%;justify-content:center;display:flex;align-items:center;gap:.5rem;}
input,textarea{font-family:'Noto Serif JP',serif;font-size:16px;-webkit-text-size-adjust:100%;}

/* ローディング */
#loading{position:fixed;inset:0;z-index:900;background:rgba(10,7,2,.88);backdrop-filter:blur(6px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:1rem;}
#loading.on{display:flex;}
.spin{width:44px;height:44px;border:3px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{color:var(--gold-l);font-size:.88rem;letter-spacing:.08em;}

/* ═══════════════════════════════════════
   画面1: セットアップ
═══════════════════════════════════════ */
#setupScreen{
  background:linear-gradient(160deg,var(--bg),var(--bg2) 60%,var(--bg3));
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem 1.5rem;padding-top:calc(2rem + var(--safe-t));min-height:100vh;gap:0;
}
.setup-logo{font-family:'Shippori Mincho',serif;font-size:1.8rem;font-weight:800;color:var(--gold-l);letter-spacing:.2em;text-shadow:0 2px 24px rgba(201,168,76,.4);margin-bottom:.4rem;}
.setup-logo span{color:var(--gold);}
.setup-sub{color:var(--faded);font-size:.78rem;letter-spacing:.1em;margin-bottom:1.8rem;}
.setup-card{background:var(--warm);border-radius:12px;padding:1.5rem;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.4);}
.setup-card h2{font-family:'Shippori Mincho',serif;font-size:1rem;color:var(--sepia-d);margin-bottom:1.2rem;letter-spacing:.1em;padding-bottom:.6rem;border-bottom:1px solid rgba(139,111,71,.2);}
.fg{margin-bottom:.9rem;}
.fl{display:block;font-size:.72rem;color:var(--sepia);letter-spacing:.08em;margin-bottom:.3rem;font-weight:600;}
.fi{width:100%;background:#fff;border:1px solid rgba(139,111,71,.28);border-radius:6px;padding:.6rem .8rem;color:var(--ink);outline:none;transition:border-color .2s;}
.fi:focus{border-color:var(--sepia);}
.setup-note{font-size:.7rem;color:var(--faded);margin-top:.3rem;line-height:1.5;}
.setup-divider{height:1px;background:rgba(139,111,71,.15);margin:1rem 0;}
.drive-connect-btn{display:flex;align-items:center;justify-content:center;gap:.6rem;width:100%;background:#fff;border:1.5px solid rgba(58,122,176,.4);border-radius:8px;padding:.75rem;cursor:pointer;transition:all .2s;color:var(--blue);font-family:'Noto Serif JP',serif;font-size:.88rem;}
.drive-connect-btn:active{background:rgba(58,122,176,.08);}
.drive-connect-btn.connected{border-color:var(--green);color:var(--green);}
#setupErr{color:var(--red);font-size:.75rem;text-align:center;min-height:1.1em;margin-top:.5rem;}

/* ═══════════════════════════════════════
   画面2: パスワード入力
═══════════════════════════════════════ */
#pwScreen{
  background:linear-gradient(160deg,var(--bg),var(--bg2) 60%,var(--bg3));
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem 1.5rem;padding-top:calc(2rem + var(--safe-t));min-height:100vh;gap:1.2rem;
}
.pw-logo{font-family:'Shippori Mincho',serif;font-size:2rem;font-weight:800;color:var(--gold-l);letter-spacing:.2em;text-shadow:0 2px 24px rgba(201,168,76,.4);}
.pw-logo span{color:var(--gold);}
.pw-school{color:var(--gold);font-size:.85rem;letter-spacing:.1em;}
.pw-line{width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.pw-field{display:flex;flex-direction:column;gap:.6rem;width:100%;max-width:280px;}
#pwInput{background:rgba(245,240,232,.08);border:1.5px solid rgba(201,168,76,.35);border-radius:8px;padding:.85rem 1.1rem;color:var(--cream);outline:none;letter-spacing:.1em;text-align:center;transition:border-color .2s;width:100%;}
#pwInput:focus{border-color:var(--gold);}
#pwInput.err{border-color:var(--red);animation:shake .35s;}
@keyframes shake{0%,100%{transform:translateX(0)}30%{transform:translateX(-8px)}70%{transform:translateX(8px)}}
#pwEnterBtn{background:var(--gold);border:none;border-radius:8px;padding:.85rem;color:var(--bg);font-family:'Shippori Mincho',serif;font-size:1rem;font-weight:600;letter-spacing:.15em;cursor:pointer;transition:background .2s;}
#pwEnterBtn:active{background:var(--gold-l);}
#pwErr{color:var(--red);font-size:.78rem;text-align:center;min-height:1.1em;}
.pw-hint{color:rgba(160,144,112,.5);font-size:.68rem;text-align:center;}

/* ═══════════════════════════════════════
   共通ヘッダー
═══════════════════════════════════════ */
.sp-header{background:linear-gradient(180deg,var(--bg),var(--bg2) 60%,var(--bg3));border-bottom:2px solid var(--gold);padding:1rem 1rem .75rem;padding-top:calc(1rem + var(--safe-t));text-align:center;position:relative;}
.sp-header h1{font-family:'Shippori Mincho',serif;font-size:1.4rem;font-weight:800;color:var(--gold-l);letter-spacing:.2em;}
.sp-header h1 span{color:var(--gold);}
.sp-header p{color:var(--faded);font-size:.68rem;margin-top:.15rem;}
.header-actions{position:absolute;right:.75rem;top:50%;transform:translateY(-50%);margin-top:calc(var(--safe-t)/2);}

/* ═══════════════════════════════════════
   画面3: 閲覧画面（新設計）
═══════════════════════════════════════ */
#viewScreen{background:var(--bg);}

/* ── トップビュー ── */
.view-search-bar{position:sticky;top:0;z-index:50;background:var(--bg2);border-bottom:1px solid rgba(201,168,76,.15);padding:.65rem .75rem;display:flex;gap:.5rem;align-items:center;}
#viewSearch{flex:1;background:rgba(245,240,232,.08);border:1px solid rgba(201,168,76,.25);border-radius:20px;padding:.5rem .9rem;color:var(--cream);outline:none;font-size:16px;transition:border-color .2s;}
#viewSearch::placeholder{color:rgba(160,144,112,.45);}
#viewSearch:focus{border-color:var(--gold);}

.class-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem;padding:.75rem;}
@media(min-width:480px){.class-grid{grid-template-columns:repeat(3,1fr);}}
.class-card{background:var(--warm);border-radius:8px;overflow:hidden;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.45),0 0 0 1px rgba(201,168,76,.18);transition:transform .15s,box-shadow .15s;position:relative;aspect-ratio:3/4;}
.class-card:active{transform:scale(.97);box-shadow:0 1px 6px rgba(0,0,0,.5);}
.class-card-thumb{width:100%;height:100%;object-fit:cover;display:block;filter:sepia(15%) contrast(.92) brightness(.95);}
.class-card-placeholder{width:100%;height:100%;background:linear-gradient(160deg,#3a2c14,#2a1f0e);display:flex;align-items:center;justify-content:center;font-size:2rem;}
.class-card-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(10,7,2,.9) 0%,rgba(10,7,2,.5) 60%,transparent 100%);padding:.6rem .5rem .5rem;text-align:center;}
.class-card-name{font-family:'Shippori Mincho',serif;font-size:.88rem;font-weight:800;color:var(--gold-l);letter-spacing:.1em;}
.class-card-sub{font-size:.62rem;color:var(--faded);margin-top:.1rem;}

/* ── クラスビュー ── */
.class-view-header{background:linear-gradient(180deg,var(--bg),var(--bg2));border-bottom:2px solid var(--gold);padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem;position:sticky;top:0;z-index:50;}
.class-back-btn{background:none;border:1px solid rgba(201,168,76,.3);border-radius:6px;color:var(--gold-l);padding:.4rem .7rem;font-size:.78rem;cursor:pointer;white-space:nowrap;font-family:'Noto Serif JP',serif;}
.class-back-btn:active{background:rgba(201,168,76,.1);}
.class-view-title{font-family:'Shippori Mincho',serif;font-size:1.1rem;font-weight:800;color:var(--gold-l);letter-spacing:.15em;flex:1;}
.class-search-bar{padding:.6rem .75rem;background:var(--bg2);border-bottom:1px solid rgba(201,168,76,.1);position:sticky;top:52px;z-index:49;}
#classSearch{width:100%;background:rgba(245,240,232,.08);border:1px solid rgba(201,168,76,.25);border-radius:20px;padding:.5rem .9rem;color:var(--cream);outline:none;font-size:16px;transition:border-color .2s;}
#classSearch::placeholder{color:rgba(160,144,112,.45);}
#classSearch:focus{border-color:var(--gold);}

.class-images-wrap{padding:.75rem;}
.class-page-img-wrap{position:relative;width:100%;margin-bottom:.75rem;border-radius:8px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.5);}
.class-page-img{width:100%;display:block;filter:sepia(8%) contrast(.96);}
.class-page-label{text-align:center;font-size:.7rem;color:var(--faded);padding:.3rem 0 .5rem;letter-spacing:.08em;}

/* 名前ハイライト（検索ヒット） */
.name-hit-overlay{position:absolute;pointer-events:none;border:2px solid var(--gold);border-radius:4px;box-shadow:0 0 0 2px rgba(201,168,76,.3);animation:hitPulse .6s ease;}
@keyframes hitPulse{0%{opacity:0;transform:scale(.85)}60%{opacity:1;transform:scale(1.05)}100%{opacity:1;transform:scale(1)}}

/* ── ズームオーバーレイ ── */
.zoom-ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.82);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);justify-content:center;align-items:flex-start;padding-top:10vh;}
.zoom-ov.open{display:flex;}
.zoom-card{display:flex;flex-direction:column;align-items:center;animation:zoomPop .32s cubic-bezier(.34,1.25,.64,1) both;}
@keyframes zoomPop{from{opacity:0;transform:scale(.15)}to{opacity:1;transform:scale(1)}}
.zoom-img-box{border-radius:8px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.75),0 0 0 2px rgba(201,168,76,.45);background-repeat:no-repeat;flex-shrink:0;}
.zoom-name-plate{margin-top:14px;text-align:center;animation:fadeUp .25s .1s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.zoom-pname{font-family:'Shippori Mincho',serif;font-size:22px;font-weight:700;letter-spacing:.12em;text-shadow:0 2px 10px rgba(0,0,0,.9);}
.zoom-pname.s{color:#ffd84d;}.zoom-pname.t{color:#4df0ff;}
.zoom-ptype{font-size:12px;color:rgba(160,144,112,.65);margin-top:4px;letter-spacing:.1em;}
.zoom-close-hint{margin-top:18px;font-size:12px;color:rgba(255,255,255,.3);}

/* ボトムナビ */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:60;background:var(--bg2);border-top:1px solid rgba(201,168,76,.2);display:none;padding-bottom:max(var(--safe-b),0px);}
.bottom-nav.on{display:flex;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:.55rem .3rem;cursor:pointer;transition:all .2s;border:none;background:transparent;color:rgba(160,144,112,.55);gap:.2rem;}
.nav-item .nav-ic{font-size:1.3rem;line-height:1;}
.nav-item .nav-lb{font-size:.58rem;font-family:'Noto Serif JP',serif;white-space:nowrap;}
.nav-item:active,.nav-item.on{color:var(--gold);}

/* ═══════════════════════════════════════
   写真詳細モーダル（閲覧用）
═══════════════════════════════════════ */
.modal-bg{display:none;position:fixed;inset:0;z-index:200;background:rgba(10,7,2,.88);backdrop-filter:blur(6px);align-items:flex-end;justify-content:center;}
.modal-bg.on{display:flex;}
.modal{background:var(--warm);width:100%;max-width:520px;border-radius:16px 16px 0 0;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:0 -8px 40px rgba(0,0,0,.6);animation:slideUp .3s cubic-bezier(.34,1.1,.64,1);padding-bottom:max(var(--safe-b),16px);}
@media(min-width:540px){.modal-bg{align-items:center;}.modal{border-radius:12px;max-height:88vh;}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-drag{width:36px;height:4px;border-radius:2px;background:rgba(139,111,71,.3);margin:.75rem auto .5rem;}
.modal-header{padding:.5rem 1.1rem .6rem;display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Shippori Mincho',serif;font-size:1rem;color:var(--sepia-d);letter-spacing:.08em;}
.modal-x{background:none;border:none;font-size:1.3rem;color:var(--faded);cursor:pointer;padding:.3rem;}
.modal-body{padding:0 1.1rem 1rem;}
.modal-foot{padding:.8rem 1.1rem;border-top:1px solid rgba(139,111,71,.15);display:flex;gap:.5rem;justify-content:flex-end;background:#f0ebe0;position:sticky;bottom:0;}

/* 詳細表示 */
.detail-img{width:100%;max-height:45vh;object-fit:contain;border-radius:6px;margin-bottom:1rem;filter:sepia(8%);}
.detail-name{font-family:'Shippori Mincho',serif;font-size:1.4rem;font-weight:800;color:var(--sepia-d);margin-bottom:.2rem;}
.detail-nick{font-size:.9rem;color:var(--sepia);margin-bottom:.3rem;}
.detail-class{font-size:.78rem;color:var(--faded);margin-bottom:.8rem;}
.detail-cmt-area{background:#f5f0e8;border-radius:6px;padding:.75rem;margin-bottom:.8rem;}
.detail-cmt-label{font-size:.7rem;color:var(--sepia);font-weight:600;margin-bottom:.3rem;}
.detail-cmt-text{font-size:.85rem;color:var(--ink);line-height:1.6;font-style:italic;}
/* コメント入力 */
.my-cmt-wrap{background:#fff;border:1px solid rgba(139,111,71,.25);border-radius:6px;overflow:hidden;}
.my-cmt-label{background:rgba(139,111,71,.08);padding:.4rem .75rem;font-size:.7rem;color:var(--sepia);font-weight:600;}
#myCmtInput{width:100%;padding:.6rem .75rem;border:none;outline:none;font-size:15px;color:var(--ink);resize:none;min-height:60px;}

/* ═══════════════════════════════════════
   スライドショー
═══════════════════════════════════════ */
.ss{display:none;position:fixed;inset:0;z-index:300;background:#000;flex-direction:column;align-items:center;justify-content:center;padding:1rem;}
.ss.on{display:flex;}
.ss-img{max-width:100%;max-height:68vh;object-fit:contain;filter:sepia(8%);animation:ssIn .6s ease;border-radius:4px;}
@keyframes ssIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.ss-info{text-align:center;margin-top:1rem;padding:0 1rem;}
.ss-name{font-family:'Shippori Mincho',serif;font-size:1.2rem;color:var(--gold-l);letter-spacing:.12em;}
.ss-nick{font-size:.82rem;color:var(--sepia);margin-top:.15rem;}
.ss-cmt{font-size:.8rem;color:var(--faded);margin-top:.15rem;font-style:italic;}
.ss-cnt{font-size:.68rem;color:rgba(160,144,112,.45);margin-top:.6rem;}
.ss-ctrl{position:fixed;bottom:calc(1.5rem + max(var(--safe-b),0px));left:50%;transform:translateX(-50%);display:flex;gap:.7rem;}
.ss-b{background:rgba(255,255,255,.1);border:1px solid rgba(201,168,76,.3);border-radius:50%;width:2.6rem;height:2.6rem;color:var(--gold-l);font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ss-b:active{background:rgba(201,168,76,.2);}

/* ═══════════════════════════════════════
   画面4: 管理画面
═══════════════════════════════════════ */
#adminScreen{background:var(--bg);}
.admin-section{padding:.75rem .75rem 7rem;}
.admin-card{background:var(--warm);border-radius:8px;margin-bottom:.75rem;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.admin-card-header{background:linear-gradient(180deg,#f5f0e8,var(--warm));padding:.75rem 1rem;border-bottom:1px solid rgba(139,111,71,.15);font-family:'Shippori Mincho',serif;font-size:.9rem;color:var(--sepia-d);letter-spacing:.08em;display:flex;align-items:center;gap:.5rem;}
.admin-card-body{padding:.9rem 1rem;}

/* Drive状態バー */
.drive-bar{background:rgba(58,122,176,.1);border-bottom:1px solid rgba(58,122,176,.2);padding:.45rem 1rem;display:flex;align-items:center;gap:.6rem;font-size:.72rem;color:var(--faded);}
.d-dot{width:7px;height:7px;border-radius:50%;background:#666;flex-shrink:0;}
.d-dot.ok{background:var(--green);}
.d-dot.ng{background:var(--red);}
.d-dot.wait{background:var(--gold);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* 管理グリッド */
.admin-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.6rem;}
@media(min-width:480px){.admin-grid{grid-template-columns:repeat(3,1fr);}}
.admin-card-photo{background:var(--warm);border-radius:6px;overflow:hidden;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3),0 0 0 1px rgba(201,168,76,.15);transition:transform .15s;position:relative;}
.admin-card-photo:active{transform:scale(.97);}
.admin-card-photo.unreg{box-shadow:0 2px 8px rgba(0,0,0,.3),0 0 0 2px rgba(192,128,64,.4);}

/* タブ（管理画面用） */
.admin-tabs{display:flex;gap:.4rem;padding:.5rem .75rem;overflow-x:auto;scrollbar-width:none;background:var(--bg2);border-bottom:1px solid rgba(201,168,76,.1);}
.admin-tabs::-webkit-scrollbar{display:none;}

/* 編集モーダル */
#blurCanvas{max-width:100%;cursor:crosshair;border:1px solid rgba(139,111,71,.25);border-radius:6px;display:block;}
.canvas-hint{font-size:.7rem;color:var(--faded);margin-top:.3rem;font-style:italic;text-align:center;}
.blur-row{display:flex;gap:.4rem;flex-wrap:wrap;margin:.7rem 0;}
.ft{width:100%;background:#fff;border:1px solid rgba(139,111,71,.28);border-radius:6px;padding:.6rem .8rem;color:var(--ink);outline:none;resize:vertical;min-height:68px;}
.type-row{display:flex;gap:.4rem;margin-bottom:.85rem;}
.type-b{flex:1;background:transparent;border:1px solid rgba(139,111,71,.25);border-radius:6px;padding:.55rem .4rem;font-family:'Noto Serif JP',serif;font-size:.78rem;cursor:pointer;transition:all .2s;color:var(--faded);text-align:center;}
.type-b.on{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--sepia-d);}

/* セーブステータス */
.save-s{font-size:.68rem;padding:.2rem .5rem;border-radius:4px;}
.save-s.saved{color:#5aaa5a;background:rgba(90,170,90,.1);border:1px solid rgba(90,170,90,.25);}
.save-s.saving{color:var(--gold);background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);}
.save-s.warn{color:#c08040;background:rgba(192,128,64,.1);border:1px solid rgba(192,128,64,.25);}

/* メニューシート */
.menu-bg{display:none;position:fixed;inset:0;z-index:150;background:rgba(10,7,2,.7);}
.menu-bg.on{display:block;}
.menu-sheet{position:fixed;bottom:0;left:0;right:0;z-index:160;background:var(--bg2);border-radius:16px 16px 0 0;padding:.5rem 0 calc(.5rem + max(var(--safe-b),0px));animation:slideUp .25s ease;}
.menu-drag{width:36px;height:4px;border-radius:2px;background:rgba(201,168,76,.25);margin:.6rem auto .8rem;}

<script>
// ════════════════════════════════════════════════════════
// ★★ 設定（Google Drive APIキー取得後にここを書き換える）★★
const GAPI_CLIENT_ID = '1060250626561-rs6tnhuhvr61qorkdhkitp6bnki12dn1.apps.googleusercontent.com';
const DRIVE_FOLDER_ID = '1oUajUSeZo9sHTp60jdXalfHPKsx2m-1m';
// ════════════════════════════════════════════════════════

// ── 定数 ────────────────────────────────────────────────
const SCOPES      = 'https://www.googleapis.com/auth/drive';
const CONFIG_FILE = 'album-config.json';
const DATA_FILE   = 'album-data.json';
const SKEY_DATA   = 'sotsuaru_v5_data';
const SKEY_CONFIG = 'sotsuaru_v5_config';
const SKEY_CMTS   = 'sotsuaru_v5_comments';

// ── 状態 ────────────────────────────────────────────────
let photos    = [];
let config    = null;   // { schoolName, year, viewPw, adminPw }
let comments  = {};     // { photoId: 'コメント文字列' }
let editingId = null;
let currentFilter   = 'all';
let adminFilter     = 'all';
let gapiReady = false;
let gisReady  = false;
let tokenClient  = null;
let accessToken  = null;
let currentType  = 'graduation';
let viewingId    = null;

// canvas
let cvs,ctx,origImg,drawing=false,sx,sy,cx,cy,saved=null;

// slideshow
let ssIdx=0,ssTimer=null,ssPaused=false,swipeX=null;

// ── ユーティリティ ────────────────────────────────────
const $=(id)=>document.getElementById(id);
function load(msg){$('loadTxt').textContent=msg||'処理中...';$('loading').classList.add('on');}
function unload(){$('loading').classList.remove('on');}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  $(id).classList.add('on');
  // ナビ切り替え
  $('viewNav').classList.toggle('on', id==='viewScreen');
  $('adminNav').classList.toggle('on', id==='adminScreen');
}

// ── 起動処理 ─────────────────────────────────────────
window.addEventListener('load', ()=>{
  config   = loadConfig();
  comments = loadComments();
  loadCache();

  if(!config){
    // ローカルに設定がない → DriveからConfigを試みる
    showScreen('pwScreen');
    $('pwSchoolName').textContent = '読み込み中...';
    initGAPI();
    // GAPIの初期化後にDriveからConfigを取得
    const tryLoadConfigFromDrive = async () => {
      let retries = 0;
      while ((!gapiReady || !gisReady) && retries < 20) {
        await new Promise(r => setTimeout(r, 300));
        retries++;
      }
      if (gapiReady && gisReady && !GAPI_CLIENT_ID.includes('★')) {
        // サイレントサインイン試行
        tokenClient.requestAccessToken({ prompt: '' });
      } else {
        // Drive接続なしの場合はsetupへ
        showScreen('setupScreen');
      }
    };
    tryLoadConfigFromDrive();
  } else {
    showScreen('pwScreen');
    $('pwSchoolName').textContent = `${config.schoolName} ${config.year}`;
    initGAPI();
  }
});

// ════════════════════════════════════════════════════════
// セットアップ画面
// ════════════════════════════════════════════════════════
let setupDriveConnected = false;

$('setupDriveBtn').onclick = ()=>{
  if(!gapiReady || !gisReady){ initGAPI(); }
  tokenClient?.requestAccessToken({prompt:'consent'});
};

$('setupDoneBtn').onclick = async ()=>{
  const school  = $('setupSchool').value.trim();
  const year    = $('setupYear').value.trim();
  const viewPw  = $('setupViewPw').value.trim();
  const adminPw = $('setupAdminPw').value.trim();

  if(!school || !year || !viewPw || !adminPw){
    $('setupErr').textContent = 'すべての項目を入力してください';
    return;
  }
  if(viewPw === adminPw){
    $('setupErr').textContent = '閲覧パスワードと管理パスワードは別にしてください';
    return;
  }

  config = { schoolName: school, year, viewPw, adminPw };
  saveConfig(config);

  // DriveにConfigを保存
  if(accessToken){
    load('設定をGoogle Driveに保存中...');
    await saveDriveConfig();
    unload();
  }

  showScreen('pwScreen');
  $('pwSchoolName').textContent = `${config.schoolName} ${config.year}`;
};

// ════════════════════════════════════════════════════════
// パスワード画面
// ════════════════════════════════════════════════════════
$('pwEnterBtn').onclick = $('pwInput').onkeydown = function(e){
  if(e.type==='keydown' && e.key!=='Enter') return;
  const v = $('pwInput').value.trim();
  if(v === config?.adminPw){
    $('pwInput').value = '';
    showScreen('adminScreen');
    $('adminSchoolLabel').textContent = `${config.schoolName} ${config.year}`;
    renderAdminGrid();
    initGAPIIfNeeded();
  } else if(v === config?.viewPw){
    $('pwInput').value = '';
    showScreen('viewScreen');
    $('viewSchoolLabel').textContent = `${config.schoolName} ${config.year}`;
    initViewScreen();
    initGAPIIfNeeded();
    // 閲覧ログイン後にDriveから写真を自動同期
    if(accessToken){ syncFromDrive(); }
    else {
      // GAPIが準備できたら自動同期
      const waitAndSync = async () => {
        let retries = 0;
        while(!accessToken && retries < 30){ 
          await new Promise(r=>setTimeout(r,500)); 
          retries++; 
        }
        if(accessToken) syncFromDrive();
      };
      waitAndSync();
    }
  } else {
    const el=$('pwInput');
    el.classList.add('err');
    $('pwErr').textContent='パスワードが違います';
    setTimeout(()=>{el.classList.remove('err');el.value='';},900);
  }
};

// ════════════════════════════════════════════════════════
// Google API
// ════════════════════════════════════════════════════════
function initGAPI(){
  if(GAPI_CLIENT_ID.includes('★')){
    setDrive('wait','Drive: APIキー未設定（デモモード）'); return;
  }
  gapi.load('client', async()=>{
    await gapi.client.init({discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']});
    gapiReady = true; checkGAPIReady();
  });
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GAPI_CLIENT_ID, scope: SCOPES,
    callback: async(r)=>{
      if(r.error){
        setDrive('ng','Google認証失敗');
        if(!config && $('pwScreen').classList.contains('on')) showScreen('setupScreen');
        return;
      }
      accessToken = r.access_token;
      gapi.client.setToken({access_token: accessToken});
      setDrive('ok','Drive: 接続済み ✓');
      if($('setupScreen').classList.contains('on')){
        $('setupDriveTxt').textContent = '✓ Google Driveに接続しました';
        $('setupDriveBtn').classList.add('connected');
        setupDriveConnected = true;
      }
      // パスワード画面でconfigがない場合 → DriveからConfig読み込み
      if($('pwScreen').classList.contains('on') && !config){
        load('設定を読み込み中...');
        try{
          const cfgId = await findFile(CONFIG_FILE);
          if(cfgId){
            const raw = await dlFile(cfgId);
            config = JSON.parse(raw);
            saveConfig(config);
            $('pwSchoolName').textContent = config.schoolName + ' ' + config.year;
          } else {
            showScreen('setupScreen');
          }
        }catch(e){ showScreen('setupScreen'); }
        finally{ unload(); }
      }
    },
  });
  gisReady = true; checkGAPIReady();
}
function initGAPIIfNeeded(){ if(!gapiReady) initGAPI(); }
function checkGAPIReady(){
  if(gapiReady && gisReady) setDrive('wait','Drive: 「同期」ボタンで接続');
}
function setDrive(s,m){
  const dot = $('dDot'); if(!dot) return;
  dot.className='d-dot '+s;
  $('driveMsg').textContent = m;
}

// ── Drive操作 ─────────────────────────────────────────
async function findFile(name, pid=DRIVE_FOLDER_ID){
  const q=`name='${name}' and '${pid}' in parents and trashed=false`;
  const r=await gapi.client.drive.files.list({q,fields:'files(id)',spaces:'drive'});
  return r.result.files[0]?.id||null;
}
async function mkFolder(name, pid){
  const q=`name='${name}' and '${pid}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`;
  const r=await gapi.client.drive.files.list({q,fields:'files(id)',spaces:'drive'});
  if(r.result.files[0]) return r.result.files[0].id;
  const c=await gapi.client.drive.files.create({resource:{name,mimeType:'application/vnd.google-apps.folder',parents:[pid]},fields:'id'});
  return c.result.id;
}
async function dlFile(id){
  const r=await gapi.client.drive.files.get({fileId:id,alt:'media'});
  return typeof r.body==='string'?r.body:JSON.stringify(r.result);
}
async function dlDataUrl(id){
  return new Promise((res,rej)=>{
    const x=new XMLHttpRequest();
    x.open('GET',`https://www.googleapis.com/drive/v3/files/${id}?alt=media`);
    x.setRequestHeader('Authorization','Bearer '+accessToken);
    x.responseType='blob';
    x.onload=()=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(x.response);};
    x.onerror=rej; x.send();
  });
}
async function uploadDrive(blob, name, pid, eid=null){
  const meta=eid?{name}:{name,parents:[pid]};
  const form=new FormData();
  form.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));
  form.append('file',blob);
  const url=eid
    ?`https://www.googleapis.com/upload/drive/v3/files/${eid}?uploadType=multipart`
    :'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id';
  const r=await fetch(url,{method:eid?'PATCH':'POST',headers:{Authorization:'Bearer '+accessToken},body:form});
  return r.json();
}
async function saveDriveData(){
  if(!accessToken) return;
  const blob=new Blob([JSON.stringify({version:5,updated:new Date().toISOString(),photos},null,2)],{type:'application/json'});
  const eid=await findFile(DATA_FILE);
  await uploadDrive(blob,DATA_FILE,DRIVE_FOLDER_ID,eid||null);
}
async function saveDriveConfig(){
  if(!accessToken||!config) return;
  const blob=new Blob([JSON.stringify(config,null,2)],{type:'application/json'});
  const eid=await findFile(CONFIG_FILE);
  await uploadDrive(blob,CONFIG_FILE,DRIVE_FOLDER_ID,eid||null);
}
async function uploadPhoto(dataUrl, name){
  if(!accessToken) return null;
  const pid=await mkFolder('photos',DRIVE_FOLDER_ID);
  const blob=await(await fetch(dataUrl)).blob();
  const r=await uploadDrive(blob,name,pid);
  return r.id||null;
}

// ── Drive同期 ─────────────────────────────────────────
$('navSync').onclick = ()=>{
  if(!accessToken) tokenClient?.requestAccessToken({prompt:'consent'});
  else syncFromDrive();
};
async function syncFromDrive(){
  load('Google Driveと同期中...');
  try{
    // configをDriveから取得
    const cfgId=await findFile(CONFIG_FILE);
    if(cfgId){
      const raw=await dlFile(cfgId);
      const driveCfg=JSON.parse(raw);
      config={...config,...driveCfg};
      saveConfig(config);
    }
    // データ取得
    const dfId=await findFile(DATA_FILE);
    if(dfId){const raw=await dlFile(dfId);const d=JSON.parse(raw);photos=d.photos||[];}
    // 新しい写真をDriveから取得
    const pfId=await mkFolder('photos',DRIVE_FOLDER_ID);
    const res=await gapi.client.drive.files.list({q:`'${pfId}' in parents and trashed=false and mimeType contains 'image/'`,fields:'files(id,name)',spaces:'drive',pageSize:300});
    const drvPh=res.result.files||[];
    for(const df of drvPh){
      if(!photos.find(p=>p.driveId===df.id)){
        photos.push({id:'dr_'+df.id,name:'',nick:'',cls:'',cmt:'',type:'graduation',driveId:df.id,drvName:df.name,url:null,edited:null});
      }
    }
    // 画像ダウンロード
    let n=0;
    for(const p of photos){
      if(p.driveId&&!p.url){
        load(`写真を読み込み中... ${++n}/${photos.length}`);
        p.url=await dlDataUrl(p.driveId);
      }
    }
    saveCache(); renderAdminGrid(); initViewScreen();
    setDrive('ok',`Drive: 同期完了 ✓（${photos.length}枚）`);
  }catch(e){console.error(e);setDrive('ng','同期エラー: '+e.message);}
  finally{unload();}
}

let stimer=null;
function saveCache(){
  setSt('saving','保存中...');
  clearTimeout(stimer);
  stimer=setTimeout(async()=>{
    try{
      const j=JSON.stringify(photos);
      const kb=Math.round(j.length/1024);
      localStorage.setItem(SKEY_DATA,j);
      if(accessToken) await saveDriveData();
      setSt(kb>4000?'warn':'saved', kb>4000?`⚠️ 容量注意 ${kb}KB`:`✓ 保存済み（${kb}KB）`);
    }catch{setSt('warn','⚠️ 保存失敗');}
  },800);
}
function loadCache(){
  try{const r=localStorage.getItem(SKEY_DATA);if(r)photos=JSON.parse(r);}catch{photos=[];}
}
function saveConfig(cfg){localStorage.setItem(SKEY_CONFIG,JSON.stringify(cfg));}
function loadConfig(){
  try{const r=localStorage.getItem(SKEY_CONFIG);return r?JSON.parse(r):null;}catch{return null;}
}
function saveComments(c){localStorage.setItem(SKEY_CMTS,JSON.stringify(c));}
function loadComments(){
  try{const r=localStorage.getItem(SKEY_CMTS);return r?JSON.parse(r):{};}catch{return{};}
}
function setSt(t,m){
  [$('saveStatus'),$('saveStatus2')].forEach(el=>{if(el){el.className='save-s '+t;el.textContent=m;}});
}

let scanImgLoading = {}; // {pageKey: Promise}

// ── ズーム計算 ─────────────────────────────────────────
function calcZoomCSS(point) {
  const pr = ZOOM_PARAMS[point.type];
  const r = pr.range, a = pr.asp, disp = pr.disp;
  const cx = point.x, cy = point.y;
  const sx = Math.max(0, cx - r);
  const sy = Math.max(0, cy - Math.round(r * a));
  const sw = Math.min(r * 2, IMG_W - sx);
  const sh = Math.min(Math.round(r * 2 * a), IMG_H - sy);
  const dispH = Math.round(disp * a);
  const scaleX = disp / sw;
  const scaleY = dispH / sh;
  const bgW = Math.round(IMG_W * scaleX);
  const bgH = Math.round(IMG_H * scaleY);
  const bgX = -Math.round(sx * scaleX);
  const bgY = -Math.round(sy * scaleY);
  return { w: disp, h: dispH, bgW, bgH, bgX, bgY };
}

// ── 画像ロード（Drive） ───────────────────────────────
async function loadScanImg(pageKey) {
  if (scanImgCache[pageKey]) return scanImgCache[pageKey];
  if (scanImgLoading[pageKey]) return scanImgLoading[pageKey];
  const fileId = SCAN_FILE_IDS[pageKey];
  if (!fileId) return null;
  if (!accessToken) return null;
  scanImgLoading[pageKey] = dlDataUrl(fileId).then(url => {
    scanImgCache[pageKey] = url;
    delete scanImgLoading[pageKey];
    return url;
  }).catch(() => null);
  return scanImgLoading[pageKey];
}

function renderClassGrid() {
  const grid = $('classGrid');
  grid.innerHTML = '';
  for (let i = 1; i <= 7; i++) {
    const card = document.createElement('div');
    card.className = 'class-card';
    card.innerHTML = `
      <div class="class-card-placeholder" id="classThumb${i}">📷</div>
      <div class="class-card-label">
        <div class="class-card-name">3年${i}組</div>
        <div class="class-card-sub">${countStudents(i)}名</div>
      </div>`;
    card.onclick = () => openClassView(i);
    grid.appendChild(card);
    // サムネイル非同期ロード
    loadScanImg(i + '_01').then(url => {
      if (!url) return;
      const thumb = $('classThumb' + i);
      if (!thumb) return;
      const img = document.createElement('img');
      img.className = 'class-card-thumb';
      img.src = url;
      thumb.replaceWith(img);
    });
  }
}

function countStudents(classNum) {
  const k01 = classNum + '_01';
  const k02 = classNum + '_02';
  const c01 = (COORD_DATA[k01] || []).length;
  const c02 = (COORD_DATA[k02] || []).length;
  return c01 + c02;
}

// ── クラスビューを開く ────────────────────────────────
async function openClassView(classNum, searchQuery, hitPoint) {
  currentClassNum = classNum;
  $('topView').style.display = 'none';
  $('classView').style.display = 'block';
  $('viewNav').classList.add('on');
  $('classViewTitle').textContent = '3年' + classNum + '組';
  $('classSearch').value = searchQuery || '';

  const wrap = $('classImagesWrap');
  wrap.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--faded);">画像を読み込み中...</div>';

  // 2ページ分の画像を順番に描画
  wrap.innerHTML = '';
  for (const page of ['01', '02']) {
    const key = classNum + '_' + page;
    const fileId = SCAN_FILE_IDS[key];
    if (!fileId) continue;

    // 画像ラッパー
    const imgWrap = document.createElement('div');
    imgWrap.className = 'class-page-img-wrap';
    imgWrap.id = 'pageWrap_' + key;
    imgWrap.style.position = 'relative';

    const placeholder = document.createElement('div');
    placeholder.style.cssText = 'width:100%;aspect-ratio:3/4;background:#2a1f0e;display:flex;align-items:center;justify-content:center;color:var(--faded);font-size:.8rem;';
    placeholder.textContent = '読み込み中...';
    imgWrap.appendChild(placeholder);

    const label = document.createElement('div');
    label.className = 'class-page-label';
    label.textContent = page === '01' ? '前のページ' : '後のページ';

    wrap.appendChild(imgWrap);
    wrap.appendChild(label);

    // 非同期で画像ロード
    loadScanImg(key).then(url => {
      if (!url) { placeholder.textContent = '画像の読み込みに失敗しました'; return; }
      const img = document.createElement('img');
      img.className = 'class-page-img';
      img.src = url;
      img.dataset.key = key;
      imgWrap.innerHTML = '';
      imgWrap.appendChild(img);

      // 名前タップイベントを設置
      setupNameTaps(imgWrap, img, key);

      // 検索ヒットがあれば自動ズーム
      if (hitPoint && key === classNum + '_' + (hitPoint ? '01' : '02')) {
        // ヒットしたページに対してズーム
      }
    });
  }

  // 検索クエリがある場合、ヒット者を自動ズーム
  if (hitPoint) {
    setTimeout(() => openZoom(hitPoint, classNum + '_01'), 800);
  }
}

// ── 名前タップのオーバーレイ設置 ─────────────────────
function setupNameTaps(wrap, img, key) {
  const pts = COORD_DATA[key] || [];
  pts.forEach(p => {
    const tap = document.createElement('div');
    tap.style.cssText = 'position:absolute;cursor:pointer;-webkit-tap-highlight-color:transparent;';
    // 座標を画像表示サイズに変換（画像ロード後）
    const updatePos = () => {
      const scaleX = img.clientWidth / IMG_W;
      const scaleY = img.clientHeight / IMG_H;
      const tapSize = 60;
      tap.style.left = Math.round(p.x * scaleX - tapSize / 2) + 'px';
      tap.style.top = Math.round(p.y * scaleY - tapSize / 2) + 'px';
      tap.style.width = tapSize + 'px';
      tap.style.height = tapSize + 'px';
    };
    if (img.complete) updatePos();
    else img.onload = updatePos;
    tap.onclick = (e) => { e.stopPropagation(); openZoom(p, key); };
    wrap.appendChild(tap);
  });
}

// ── ズームを開く ──────────────────────────────────────
function openZoom(point, pageKey) {
  const css = calcZoomCSS(point);
  const imgUrl = scanImgCache[pageKey];
  if (!imgUrl) {
    showToast('画像を読み込み中です。少しお待ちください。');
    return;
  }
  const box = $('zoomImgBox');
  box.style.width = css.w + 'px';
  box.style.height = css.h + 'px';
  box.style.backgroundImage = 'url(' + imgUrl + ')';
  box.style.backgroundSize = css.bgW + 'px ' + css.bgH + 'px';
  box.style.backgroundPosition = css.bgX + 'px ' + css.bgY + 'px';

  // アニメーションリセット
  const card = document.querySelector('.zoom-card');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = '';

  const pn = $('zoomPname');
  pn.textContent = point.name;
  pn.className = 'zoom-pname ' + (point.type === 'teacher' ? 't' : 's');
  $('zoomPtype').textContent = point.type === 'teacher' ? '先生' : '生徒';
  $('zoomOv').classList.add('open');
}

    load(`アップロード中: ${f.name}`);
    const url=await toDataUrl(f);
    const did=accessToken?await uploadPhoto(url,f.name):null;
    photos.push({id:'lc_'+Date.now()+Math.random(),name:'',nick:'',cls:'',cmt:'',type:'graduation',driveId:did,drvName:f.name,url,edited:null});
    saveCache();renderAdminGrid();
  }
  unload();
}
function toDataUrl(f){return new Promise((r,j)=>{const x=new FileReader();x.onload=e=>r(e.target.result);x.onerror=j;x.readAsDataURL(f);});}

// ── Excel インポート ───────────────────────────────────
$('navImportXlsx').onclick=()=>$('xlsxInput').click();
$('xlsxInput').onchange=async e=>{
  const f=e.target.files[0];if(!f)return;
  load('Excelを読み込み中...');
  try{
    const buf=await f.arrayBuffer();
    // SheetJSを動的ロード
    if(!window.XLSX){
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js');
    }
    const wb=XLSX.read(buf,{type:'array'});
    const ws=wb.Sheets['あだ名マスター'];
    if(!ws){alert('「あだ名マスター」シートが見つかりません');unload();return;}
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    // ヘッダー行をスキップ（No.があるのが実データ行）
    let imported=0;
    for(const row of rows){
      const no=row[0];
      if(typeof no!=='number')continue;
      const cls    = String(row[1]||'').trim();
      const name   = String(row[2]||'').trim();
      const nick   = String(row[3]||'').trim();
      const phPath = String(row[5]||'').trim();
      if(!name)continue;
      // 既存の写真と名前・パスで照合して更新、なければ新規追加
      const existing=photos.find(p=>p.name===name || (phPath && p.drvName===phPath.split('/').pop()));
      if(existing){
        if(name)  existing.name=name;
        if(nick)  existing.nick=nick;
        if(cls)   existing.cls=cls;
      } else {
        photos.push({id:'xl_'+Date.now()+Math.random(),name,nick,cls,cmt:'',type:'graduation',driveId:null,drvName:phPath.split('/').pop()||'',url:null,edited:null});
      }
      imported++;
    }
    saveCache();renderAdminGrid();renderViewGrid();
    showToast(`${imported}件をインポートしました`);
  }catch(err){console.error(err);alert('Excelの読み込みに失敗しました: '+err.message);}
  finally{unload();e.target.value='';}
};
function loadScript(src){return new Promise((r,j)=>{const s=document.createElement('script');s.src=src;s.onload=r;s.onerror=j;document.head.appendChild(s);});}

// ── Canvas / Blur ──────────────────────────────────────
function initCanvas(src){
  cvs=$('blurCanvas');ctx=cvs.getContext('2d');
  origImg=new Image();
  origImg.onload=()=>{
    const mw=Math.min(origImg.width,window.innerWidth-44);
    const sc=mw/origImg.width;
    cvs.width=mw;cvs.height=origImg.height*sc;
    ctx.drawImage(origImg,0,0,cvs.width,cvs.height);
    saved=ctx.getImageData(0,0,cvs.width,cvs.height);
  };
  origImg.src=src||'';
  const pt=e=>{
    const r=cvs.getBoundingClientRect();
    const t=e.touches?e.touches[0]:e;
    return{x:(t.clientX-r.left)*(cvs.width/r.width),y:(t.clientY-r.top)*(cvs.height/r.height)};
  };
  cvs.onmousedown=e=>{drawing=true;({x:sx,y:sy}=pt(e));};
  cvs.onmousemove=e=>{if(!drawing)return;({x:cx,y:cy}=pt(e));previewRect();};
  cvs.onmouseup=cvs.onmouseleave=()=>{drawing=false;};
  cvs.ontouchstart=e=>{e.preventDefault();drawing=true;({x:sx,y:sy}=pt(e));};
  cvs.ontouchmove=e=>{e.preventDefault();if(!drawing)return;({x:cx,y:cy}=pt(e));previewRect();};
  cvs.ontouchend=()=>{drawing=false;};
}
function previewRect(){
  ctx.putImageData(saved,0,0);
  ctx.strokeStyle='rgba(201,168,76,.9)';ctx.lineWidth=2;ctx.setLineDash([5,3]);
  ctx.strokeRect(sx,sy,cx-sx,cy-sy);
}
function applyFx(type){
  if(!cvs||!ctx||cx===undefined)return;
  ctx.setLineDash([]);
  const x=Math.min(sx,cx),y=Math.min(sy,cy),w=Math.abs(cx-sx),h=Math.abs(cy-sy);
  if(w<5||h<5)return;
  const id=ctx.getImageData(x,y,w,h),d=id.data;
  if(type==='blur'){
    const R=10;
    for(let py=0;py<h;py++)for(let px=0;px<w;px++){
      let r=0,g=0,b=0,n=0;
      for(let dy=-R;dy<=R;dy++)for(let dx=-R;dx<=R;dx++){
        const nx=px+dx,ny=py+dy;
        if(nx>=0&&nx<w&&ny>=0&&ny<h){const i=(ny*w+nx)*4;r+=d[i];g+=d[i+1];b+=d[i+2];n++;}
      }
      const i=(py*w+px)*4;d[i]=r/n;d[i+1]=g/n;d[i+2]=b/n;
    }
  }else{
    const S=16;
    for(let py=0;py<h;py+=S)for(let px=0;px<w;px+=S){
      const i=(py*w+px)*4,cr=d[i],cg=d[i+1],cb=d[i+2];
      for(let dy=0;dy<S&&py+dy<h;dy++)for(let dx=0;dx<S&&px+dx<w;dx++){
        const ni=((py+dy)*w+(px+dx))*4;d[ni]=cr;d[ni+1]=cg;d[ni+2]=cb;
      }
    }
  }
  ctx.putImageData(id,x,y);
  saved=ctx.getImageData(0,0,cvs.width,cvs.height);
}
$('blurBtn').onclick=()=>applyFx('blur');
$('mosaicBtn').onclick=()=>applyFx('mosaic');
$('undoBtn').onclick=()=>{if(!cvs||!origImg)return;ctx.drawImage(origImg,0,0,cvs.width,cvs.height);saved=ctx.getImageData(0,0,cvs.width,cvs.height);};

// ── 編集モーダル ───────────────────────────────────────
function openEdit(id){
  editingId=id;
  const p=photos.find(x=>String(x.id)===String(id));if(!p)return;
  $('nameIn').value=p.name||'';
  $('nickIn').value=p.nick||'';
  $('classIn').value=p.cls||'';
  $('cmtIn').value=p.cmt||'';
  currentType=p.type||'graduation';
  document.querySelectorAll('.type-b').forEach(b=>b.classList.toggle('on',b.dataset.type===currentType));
  $('editModal').classList.add('on');
  setTimeout(()=>initCanvas(p.edited||p.url||''),100);
}
document.querySelectorAll('.type-b').forEach(b=>b.onclick=()=>{
  currentType=b.dataset.type;
  document.querySelectorAll('.type-b').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
});
function closeEdit(){$('editModal').classList.remove('on');editingId=null;}
$('editClose').onclick=$('editCancel').onclick=closeEdit;
$('editModal').onclick=e=>{if(e.target===$('editModal'))closeEdit();};
$('editSave').onclick=()=>{
  const p=photos.find(x=>String(x.id)===String(editingId));if(!p)return;
  p.name=$('nameIn').value.trim();
  p.nick=$('nickIn').value.trim();
  p.cls=$('classIn').value.trim();
  p.cmt=$('cmtIn').value.trim();
  p.type=currentType;
  if(cvs)p.edited=cvs.toDataURL('image/jpeg',.88);
  closeEdit();saveCache();renderAdminGrid();renderViewGrid();
};
$('delBtn').onclick=()=>{
  if(confirm('この写真を削除しますか？')){
    photos=photos.filter(x=>String(x.id)!==String(editingId));
    closeEdit();saveCache();renderAdminGrid();renderViewGrid();
  }
};

// 管理メニュー
$('navAdminMenu').onclick=()=>{$('adminMenuBg').classList.add('on');$('adminMenuSheet').style.display='block';};
$('adminMenuBg').onclick=()=>{$('adminMenuBg').classList.remove('on');$('adminMenuSheet').style.display='none';};
function closeAdminMenu(){$('adminMenuBg').classList.remove('on');$('adminMenuSheet').style.display='none';}
$('mExport').onclick=()=>{
  closeAdminMenu();
  if(!photos.length){alert('写真がありません');return;}
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify({version:5,photos},null,2)],{type:'application/json'}));
  a.download=`sotsuaru_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();setSt('saved','✓ バックアップ完了');
};
$('mImport').onclick=()=>{closeAdminMenu();$('importInput').click();};
$('importInput').onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      const imp=d.photos||d;if(!Array.isArray(imp))throw 0;
      const merge=photos.length>0?confirm(`現在${photos.length}件あります。\n[OK]追加 [キャンセル]上書き`):false;
      photos=merge?[...photos,...imp]:imp;
      saveCache();renderAdminGrid();renderViewGrid();setSt('saved',`✓ ${imp.length}件 復元完了`);
    }catch{alert('読み込みに失敗しました。');}
  };
  r.readAsText(f);e.target.value='';
};
$('mToView').onclick=()=>{closeAdminMenu();showScreen('viewScreen');renderViewGrid();};
$('mClearAll').onclick=()=>{
  closeAdminMenu();
  if(!photos.length)return;
  if(confirm(`全${photos.length}件を削除しますか？（Driveのファイルは削除されません）`)){
    photos=[];localStorage.removeItem(SKEY_DATA);setSt('saved','削除しました');
    renderAdminGrid();renderViewGrid();
  }
};

// ── トースト通知 ───────────────────────────────────────
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';Object.assign(t.style,{position:'fixed',bottom:'calc(5rem + max(env(safe-area-inset-bottom),0px))',left:'50%',transform:'translateX(-50%)',background:'rgba(42,31,14,.95)',color:'#e8d5a3',padding:'.5rem 1.2rem',borderRadius:'20px',fontSize:'.8rem',zIndex:'999',whiteSpace:'nowrap',boxShadow:'0 4px 12px rgba(0,0,0,.4)',transition:'opacity .3s'});document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._timer);t._timer=setTimeout(()=>{t.style.opacity='0';},2000);
}

// ── キーボード ─────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if($('ss').classList.contains('on')){
    if(e.key==='Escape')stopSS();
    if(e.key==='ArrowRight'){ssPaused=true;showSlide(ssIdx+1);}
    if(e.key==='ArrowLeft'){ssPaused=true;showSlide(ssIdx-1);}
  }
  if($('editModal').classList.contains('on')&&e.key==='Escape')closeEdit();
  if($('detailModal').classList.contains('on')&&e.key==='Escape')$('detailModal').classList.remove('on');
});
</script>
