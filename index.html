<style>
:root {
  --gold:#c9a84c; --gold-l:#e8d5a3; --bg:#1a1208; --bg2:#2a1f0e;
  --cream:#f5f0e8; --warm:#faf7f2; --sepia-d:#5c4a2a; --faded:#a09070;
  --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);font-family:'Noto Serif JP',serif;color:#1a1208;overflow-x:hidden;}
.screen{display:none;} .screen.on{display:block;}

/* パスワード画面 */
#pwScreen{
  background:linear-gradient(160deg,var(--bg),var(--bg2));
  flex-direction:column;align-items:center;justify-content:center;
  padding:2rem;min-height:100vh;gap:1.5rem;text-align:center;
}
#pwScreen.on{display:flex;}
.pw-crest-img{width:100px;filter:drop-shadow(0 2px 15px rgba(201,168,76,0.6));}
.pw-logo{font-family:'Shippori Mincho',serif;font-size:2rem;color:var(--gold-l);letter-spacing:.2em;}
.pw-logo span{color:var(--gold);}
#pwInput{background:rgba(255,255,255,0.05);border:1px solid var(--gold);border-radius:8px;padding:12px;color:#fff;width:240px;text-align:center;outline:none;}
#pwEnterBtn{background:var(--gold);border:none;border-radius:8px;padding:12px 40px;font-weight:bold;cursor:pointer;margin-top:10px;}

/* 閲覧画面ヘッダー */
.sp-header{background:var(--bg2);border-bottom:2px solid var(--gold);padding:1rem;padding-top:calc(1rem + var(--safe-t));text-align:center;}
.sp-header h1{font-family:'Shippori Mincho',serif;color:var(--gold-l);font-size:1.4rem;}
.search-bar, .cp-search-bar{position:sticky;top:0;z-index:100;background:var(--bg2);padding:10px;border-bottom:1px solid rgba(201,168,76,0.2);}
input[type="search"]{width:100%;background:rgba(255,255,255,0.1);border:1px solid var(--gold);border-radius:20px;padding:8px 15px;color:#fff;outline:none;}

/* グリッド表示 */
.class-grid, .photo-grid{display:grid;gap:10px;padding:10px;}
.class-grid{grid-template-columns:1fr;}
.photo-grid{grid-template-columns:repeat(2,1fr);}
.class-card, .photo-card{background:var(--warm);border-radius:8px;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.3);cursor:pointer;}
.class-thumb, .img-wrap{aspect-ratio:3/2;background:#000;overflow:hidden;position:relative;}
.class-thumb img, .img-wrap img{width:100%;height:100%;object-fit:cover;}
.class-label, .card-info{padding:10px;text-align:center;color:var(--sepia-d);font-weight:bold;}
.c-yomi{font-size:0.7rem;color:var(--faded);font-weight:normal;}

/* クラスページ */
#classPage{background:var(--bg);min-height:100vh;}
.cp-header{background:var(--bg2);border-bottom:2px solid var(--gold);padding:10px;display:flex;align-items:center;color:var(--gold-l);}
.cp-back{background:none;border:none;color:var(--gold);font-size:1.5rem;padding:0 15px;cursor:pointer;}
.scan-block{margin-bottom:20px;position:relative;}
.scan-img-wrap{position:relative;width:100%;}
.scan-img-wrap img{width:100%;display:block;}
.highlight-canvas{position:absolute;top:0;left:0;pointer-events:none;z-index:5;}
.name-pins{position:absolute;inset:0;z-index:10;}
.name-pin{position:absolute;width:40px;height:40px;transform:translate(-50%,-50%);}

/* ズーム */
.zoom-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.9);align-items:center;justify-content:center;flex-direction:column;color:#fff;}
.zoom-overlay.on{display:flex;}
.zoom-img-wrap{width:320px;height:380px;border:2px solid var(--gold);border-radius:10px;overflow:hidden;margin-bottom:15px;}

#loading{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:2000;display:none;align-items:center;justify-content:center;color:var(--gold-l);}
#loading.on{display:flex;}
</style>
</head>

<div id="viewScreen" class="screen">
  <div class="sp-header">
    <h1 id="viewSchoolLabel"></h1>
  </div>
  <div class="search-bar">
    <input id="viewSearch" type="search" placeholder="🔍 名前・ふりがな・あだ名で検索">
  </div>
  <div id="classGrid" class="class-grid"></div>
  <div id="searchGridWrap" class="grid-wrap" style="display:none">
    <div id="viewGrid" class="photo-grid"></div>
  </div>
</div>

<div id="classPage" class="screen">
  <div class="cp-header">
    <button class="cp-back" onclick="showScreen('viewScreen')">‹ 戻る</button>
    <span id="cpTitle"></span>
  </div>
  <div class="cp-search-bar">
    <input id="cpSearch" type="search" placeholder="🔍 このクラス内を検索">
  </div>
  <div id="cpBody" class="cp-body"></div>
</div>

<div id="zoomOverlay" class="zoom-overlay" onclick="this.classList.remove('on')">
  <div class="zoom-img-wrap" id="zoomImgWrap"></div>
  <div id="zoomName" style="font-size:1.5rem; font-family:'Shippori Mincho';"></div>
  <div id="zoomYomi" style="font-size:0.9rem; color:var(--faded);"></div>
  <div id="zoomNickBadges" style="margin-top:10px;"></div>
</div>

<script>
const config = { schoolName: '千代田区立一橋中学校', year: '1990年', viewPw: 'Hitotsubashi1990', adminPw: 'Check1990' };
const NICK_SHEET_ID = '1UJB78CQ7fjbWfZkGD6FrfJ2wueInJKErZdtn4Tjh6Wo';
const $ = id => document.getElementById(id);

// ログイン
$('pwEnterBtn').onclick = () => {
  const v = $('pwInput').value.trim();
  if(v === config.viewPw || v === config.adminPw) {
    $('viewSchoolLabel').textContent = `${config.schoolName} ${config.year}`;
    showScreen('viewScreen');
    initGAPI();
  } else { $('pwErr').textContent = '認証失敗'; }
};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  $(id).classList.add('on');
}

// クラスグリッド生成
function renderClassGrid() {
  const grid = $('classGrid'); grid.innerHTML = '';
  const thumbs = {1:'1zEbEPKEHiE3jBNefNAuAiyr2ggDZr-eo', 2:'1ZVk27Weatz7IcsEu-K7tB5UhINk8X10-', 3:'1tBXYgTu65zf_JKIo8OkQRiieR-FrhuqD', 4:'1vQJGvAElE9wAiwo5p7Kji0SEWamk2B85', 5:'1lVGJ0KmKr08e5QjialpLAiqch1tDFHC6', 6:'1V7SyV0SkCLz0g36wtvxG3mlkSxoWxC94', 7:'1q9ENebnRAHkoJlW7jRO2EluP8RS_Y7IM'};
  for(let i=1; i<=7; i++) {
    const card = document.createElement('div');
    card.className = 'class-card';
    card.onclick = () => openClassPage(i);
    card.innerHTML = `<div class="class-thumb"><img src="https://drive.google.com/thumbnail?id=${thumbs[i]}&sz=w800"></div><div class="class-label">3年${i}組</div>`;
    grid.appendChild(card);
  }
}
renderClassGrid();

// シート同期（ふりがな取得）
async function initGAPI() {
  for(let cls=1; cls<=7; cls++) {
    const url = `https://docs.google.com/spreadsheets/d/${NICK_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent('3年'+cls+'組')}`;
    try {
      const res = await fetch(url);
      const text = await res.text();
      const rows = text.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '')));
      rows.forEach(row => {
        const name = row[2], nick = row[3], yomi = row[4];
        if(!name || name==='名前') return;
        ['page1','page2'].forEach(pk => {
          const p = CLASS_COORDS[cls][pk]?.find(x => x.name === name);
          if(p) { p.nick = nick; p.yomi = yomi; p.classNum = cls; }
        });
      });
    } catch(e) {}
  }
}

// 検索（トップ）
$('viewSearch').oninput = (e) => {
  const q = e.target.value.trim();
  const wrap = $('searchGridWrap'); const grid = $('viewGrid');
  if(!q) { wrap.style.display='none'; $('classGrid').style.display='grid'; return; }
  wrap.style.display='block'; $('classGrid').style.display='none'; grid.innerHTML = '';
  
  const results = [];
  for(let i=1; i<=7; i++) {
    ['page1','page2'].forEach(pk => {
      (CLASS_COORDS[i][pk]||[]).forEach(p => {
        if(p.name?.includes(q) || p.yomi?.includes(q) || p.nick?.includes(q)) results.push(p);
      });
    });
  }

  results.forEach(p => {
    const card = document.createElement('div');
    card.className = 'photo-card';
    card.innerHTML = `<div class="img-wrap"><div style="color:#fff; padding:20px;">📚</div></div><div class="card-info"><div>${p.name}</div><div class="c-yomi">${p.yomi||''}</div></div>`;
    card.onclick = () => openClassPage(p.classNum, p);
    grid.appendChild(card);
  });
};

// クラス内検索
$('cpSearch').oninput = (e) => {
  const q = e.target.value.trim();
  if(!q) { clearHighlight(); return; }
  const results = [];
  const cls = parseInt($('cpTitle').dataset.num);
  ['page1','page2'].forEach((pk, pi) => {
    (CLASS_COORDS[cls][pk]||[]).forEach(p => {
      if(p.name.includes(q) || p.yomi?.includes(q)) results.push({...p, pageIndex: pi});
    });
  });
  if(results.length) renderHighlight(results);
};

// クラスページ開く
function openClassPage(num, target) {
  $('cpTitle').textContent = `3年${num}組`; $('cpTitle').dataset.num = num;
  $('cpSearch').value = '';
  const body = $('cpBody'); body.innerHTML = '';
  const scans = CLASS_SCANS[num];
  scans.forEach((scan, pi) => {
    const wrap = document.createElement('div');
    wrap.className = 'scan-block';
    wrap.innerHTML = `<div class="scan-img-wrap" id="sw${pi}">
      <img src="https://drive.google.com/thumbnail?id=${scan.fileId}&sz=w1600" onload="attachPins(${num}, ${pi}, ${scan.w}, ${scan.h})">
      <canvas class="highlight-canvas" id="cv${pi}"></canvas>
      <div class="name-pins" id="p${pi}"></div>
    </div>`;
    body.appendChild(wrap);
  });
  showScreen('classPage');
  if(target) setTimeout(() => renderHighlight([{...target, pageIndex: target.pageIndex || 0}]), 800);
}

function attachPins(cls, pi, ow, oh) {
  const img = $(`sw${pi}`).querySelector('img');
  const pinsEl = $(`p${pi}`); const cv = $(`cv${pi}`);
  cv.width = img.offsetWidth; cv.height = img.offsetHeight;
  const sx = img.offsetWidth/ow; const sy = img.offsetHeight/oh;
  pinsEl.innerHTML = '';
  const pk = pi===0 ? 'page1' : 'page2';
  (CLASS_COORDS[cls][pk]||[]).forEach(p => {
    const pin = document.createElement('div');
    pin.className = 'name-pin'; pin.style.left = (p.x*sx)+'px'; pin.style.top = (p.y*sy)+'px';
    pin.onclick = () => openZoom(p, img.src, ow, oh, p.x*sx, p.y*sy, img.offsetWidth);
    pinsEl.appendChild(pin);
  });
}

function clearHighlight() {
  document.querySelectorAll('.highlight-canvas').forEach(c => c.getContext('2d').clearRect(0,0,c.width,c.height));
}

function renderHighlight(persons) {
  clearHighlight();
  persons.forEach(p => {
    const pi = p.pageIndex; const cv = $(`cv${pi}`); if(!cv) return;
    const ctx = cv.getContext('2d');
    const img = $(`sw${pi}`).querySelector('img');
    const cls = parseInt($('cpTitle').dataset.num);
    const scan = CLASS_SCANS[cls][pi];
    const sx = img.offsetWidth/scan.w; const sy = img.offsetHeight/scan.h;
    const r = p.type==='teacher'?60:45;
    ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 4;
    ctx.strokeRect(p.x*sx - r, p.y*sy - r*1.2, r*2, r*2.4);
    if(persons.length === 1) cv.scrollIntoView({behavior:'smooth', block:'center'});
  });
}

function openZoom(p, src, ow, oh, px, py, dw) {
  const sc = 350 / 500;
  const bgX = -( (px / (dw/ow)) * sc - 175);
  const bgY = -( (py / (dw/ow)) * sc - 150);
  $('zoomImgWrap').innerHTML = `<div style="width:100%;height:100%;background-image:url('${src}');background-size:${ow*sc}px ${oh*sc}px;background-position:${bgX}px ${bgY}px;"></div>`;
  $('zoomName').textContent = p.name; $('zoomYomi').textContent = p.yomi||'';
  $('zoomNickBadges').innerHTML = (p.nick||'').split(',').filter(Boolean).map(n => `<span style="background:var(--gold); padding:2px 8px; border-radius:10px; margin:2px; font-size:0.8rem;">${n}</span>`).join('');
  $('zoomOverlay').classList.add('on');
}

const CLASS_SCANS = {
  1: [{fileId:'19zLP0RgQFjrFId7AJs7rXYpBbLuJF95-', w:3072, h:4080},{fileId:'1c8qR0FMqu9rrQ-LREp-dq8QYpiESEezv', w:3072, h:4080}],
  2: [{fileId:'1wS0pzw1eYmE41TozeXr71Mt2xFG7W4bH', w:3072, h:4080},{fileId:'1XQwOcn9RMdlFs50is_-4JAtoIgEYbEwd', w:3072, h:4080}],
  3: [{fileId:'18gyFtN54p-clYb7h6OpPfSFDUl3etl6D', w:3072, h:4080},{fileId:'19FOebLLx0fQzZ05CtsUfLZ6-h_BMeFhz', w:3072, h:4080}],
  4: [{fileId:'1vqSYf-UWnOKBEeimMejcz9NoZUJG3MXj', w:3072, h:4080},{fileId:'1vBgVKK-GlbgTu0PzDs7m_WlH7le7cpFF', w:3072, h:4080}],
  5: [{fileId:'1hDng0AbrFfZNwpduNfzC-apj3ObptloX', w:3072, h:4080},{fileId:'1YuljtBXpze2-R950v5BGCvRTBHamjRul', w:3072, h:4080}],
  6: [{fileId:'1-uwC-cKzO9Vy2CufO2v_UqNJ1J6TWxr2', w:3072, h:4080},{fileId:'1PSex2Osgol0ozQ6Rl0GtuVG3GgevqbKK', w:3072, h:4080}],
  7: [{fileId:'1TIub3fbMcJY_CRriRlpm_JdswW0luuVO', w:3072, h:4080},{fileId:'1jN7KSichOKTQ4CcIHkjF_MJrxskzZOPc', w:3072, h:4080}]

// ピン貼り・キャンバス準備
function attachPins(cls, pi, ow, oh) {
  const img = $(`sw${pi}`).querySelector('img');
  const cv = $(`cv${pi}`); const pinsEl = $(`p${pi}`);
  cv.width = img.offsetWidth; cv.height = img.offsetHeight;
  const sx = img.offsetWidth/ow; const sy = img.offsetHeight/oh;
  pinsEl.innerHTML = '';
  const pk = pi===0 ? 'page1' : 'page2';
  (CLASS_COORDS[cls][pk]||[]).forEach(p => {
    const pin = document.createElement('div');
    pin.className = 'name-pin'; pin.style.left = (p.x*sx)+'px'; pin.style.top = (p.y*sy)+'px';
    pin.onclick = () => openZoom(p, img.src, ow, oh, p.x*sx, p.y*sy, img.offsetWidth);
    pinsEl.appendChild(pin);
  });
}

function clearHighlight() {
  document.querySelectorAll('.highlight-canvas').forEach(c => c.getContext('2d').clearRect(0,0,c.width,c.height));
}

function renderHighlight(persons) {
  clearHighlight();
  persons.forEach(p => {
    const pi = p.pageIndex; const cv = $(`cv${pi}`); if(!cv) return;
    const ctx = cv.getContext('2d');
    const img = $(`sw${pi}`).querySelector('img');
    const scan = CLASS_SCANS[p.classNum][pi];
    const sx = img.offsetWidth/scan.w; const sy = img.offsetHeight/scan.h;
    const r = p.type==='teacher'?65:45;
    ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 4;
    ctx.strokeRect(p.x*sx-r, p.y*sy-r*1.2, r*2, r*2.4);
    if(persons.length === 1) cv.scrollIntoView({behavior:'smooth', block:'center'});
  });
}

function openZoom(p, src, ow, oh, px, py, dw) {
  const sc = 350 / 550;
  const bgX = -( (px / (dw/ow)) * sc - 175);
  const bgY = -( (py / (dw/ow)) * sc - 150);
  $('zoomImgWrap').innerHTML = `<div style="width:100%;height:100%;background-image:url('${src}');background-size:${ow*sc}px ${oh*sc}px;background-position:${bgX}px ${bgY}px;"></div>`;
  $('zoomName').textContent = p.name; $('zoomYomi').textContent = p.yomi||'';
  $('zoomNickBadges').innerHTML = (p.nick||'').split(',').filter(Boolean).map(n => `<span style="background:var(--gold); padding:2px 8px; border-radius:10px; margin:2px; font-size:0.8rem; color:#000;">${n}</span>`).join('');
  $('zoomOverlay').classList.add('on');
}
