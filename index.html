<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>思い出アルバム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#c9a84c; --bg:#1a1208; --bg2:#2a1f0e; --cream:#f5f0e8; --red:#c05050;
}
/* 全体レイアウト */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { 
  background: var(--bg); 
  color: var(--cream); 
  font-family: 'Noto Serif JP', serif;
  min-height: 100vh;
  line-height: 1.6;
}

/* 画面切り替え設定 */
.screen { display: none; padding: 20px; width: 100%; min-height: 100vh; }
.screen.on { display: block; }
#setupScreen.on, #pwScreen.on { display: flex; flex-direction: column; align-items: center; justify-content: center; }

/* 共通コンポーネント */
.card { background: #faf7f2; color: #1a1208; border-radius: 12px; padding: 25px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.fg { margin-bottom: 15px; }
.fl { display: block; font-size: 0.8rem; margin-bottom: 5px; font-weight: bold; color: #5c4a2a; }
.fi { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; outline: none; }
.btn { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.2s; margin-top: 10px; }
.btn-prim { background: var(--gold); color: var(--bg); }
.btn-reset { background: none; border: 1px solid rgba(201,168,76,0.5); color: var(--gold); margin-top: 40px; font-size: 0.8rem; }

/* 閲覧・管理画面用 */
.header { text-align: center; padding: 20px 0; border-bottom: 2px solid var(--gold); margin-bottom: 20px; width: 100%; }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding-bottom: 80px; }
.photo-item { background: #fff; border-radius: 8px; overflow: hidden; color: #333; }
.photo-item img { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; }
.photo-info { padding: 8px; font-size: 0.8rem; }

/* ナビゲーション */
nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); display: none; border-top: 1px solid var(--gold); z-index: 100; }
nav.on { display: flex; }
.nav-btn { flex: 1; padding: 15px; text-align: center; background: none; border: none; color: var(--cream); font-size: 0.7rem; cursor: pointer; }

/* ローディング */
#loading { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: none; align-items: center; justify-content: center; }
#loading.on { display: flex; }
</style>
</head>
<body>

<div id="loading"><div>読み込み中...</div></div>

<div id="setupScreen" class="screen">
  <div class="card">
    <h2 style="margin-bottom:20px; text-align:center;">初期設定</h2>
    <div class="fg">
      <label class="fl">学校名</label>
      <input class="fi" id="setupSchool" placeholder="例：○○中学校">
    </div>
    <div class="fg">
      <label class="fl">閲覧用パスワード</label>
      <input class="fi" id="setupViewPw" placeholder="クラス全員用">
    </div>
    <div class="fg">
      <label class="fl">管理用パスワード</label>
      <input class="fi" id="setupAdminPw" placeholder="幹事専用">
    </div>
    <button class="btn btn-prim" onclick="handleSetup()">設定を保存して開始</button>
  </div>
</div>

<div id="pwScreen" class="screen">
  <h1 style="color:var(--gold); margin-bottom:10px;">思い出アルバム</h1>
  <div id="pwSchoolLabel" style="margin-bottom:30px;"></div>
  <div class="card">
    <div class="fg">
      <input class="fi" id="pwInput" type="password" placeholder="パスワードを入力" style="text-align:center;">
    </div>
    <button class="btn btn-prim" onclick="handleLogin()">アルバムを開く</button>
    <div id="pwErr" style="color:var(--red); text-align:center; margin-top:10px; font-size:0.8rem;"></div>
  </div>
  <button class="btn btn-reset" onclick="resetConfig()">⚙ 初期設定をやり直す</button>
</div>

<div id="viewScreen" class="screen">
  <div class="header">
    <h2 id="viewSchoolTitle">思い出アルバム</h2>
  </div>
  <div class="grid" id="viewGrid"></div>
</div>

<div id="adminScreen" class="screen">
  <div class="header">
    <h2>アルバム管理</h2>
  </div>
  <div style="text-align:center; margin-bottom:20px;">
    <button class="btn btn-prim" style="width:200px;" onclick="document.getElementById('fileIn').click()">＋ 写真を追加</button>
    <input type="file" id="fileIn" multiple accept="image/*" style="display:none" onchange="uploadPhotos(this.files)">
  </div>
  <div class="grid" id="adminGrid"></div>
</div>

<nav id="mainNav">
  <button class="nav-btn" onclick="showScreen('viewScreen'); renderView();">アルバム</button>
  <button class="nav-btn" onclick="showScreen('adminScreen'); renderAdmin();">管理</button>
  <button class="nav-btn" onclick="location.reload()">閉じる</button>
</nav>

<script>
const SKEY_CONFIG = 'album_config_v5';
const SKEY_DATA = 'album_data_v5';
let config = JSON.parse(localStorage.getItem(SKEY_CONFIG));
let photos = JSON.parse(localStorage.getItem(SKEY_DATA)) || [];

// ページ起動時の振り分け
window.onload = () => {
  if (!config) {
    showScreen('setupScreen');
  } else {
    document.getElementById('pwSchoolLabel').textContent = config.school;
    showScreen('pwScreen');
  }
};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  const target = document.getElementById(id);
  if(target) target.classList.add('on');
  
  // ナビ表示制御
  const nav = document.getElementById('mainNav');
  nav.className = (id === 'viewScreen' || id === 'adminScreen') ? 'on' : '';
}

// セットアップ保存
function handleSetup() {
  const school = document.getElementById('setupSchool').value;
  const vpw = document.getElementById('setupViewPw').value;
  const apw = document.getElementById('setupAdminPw').value;
  
  if(!school || !vpw || !apw) return alert("すべて入力してください");
  
  config = { school, viewPw: vpw, adminPw: apw };
  localStorage.setItem(SKEY_CONFIG, JSON.stringify(config));
  location.reload();
}

// ログイン処理
function handleLogin() {
  const input = document.getElementById('pwInput').value;
  if (input === config.adminPw) {
    showScreen('adminScreen');
    renderAdmin();
  } else if (input === config.viewPw) {
    showScreen('viewScreen');
    renderView();
  } else {
    document.getElementById('pwErr').textContent = "パスワードが違います";
  }
}

// リセット
function resetConfig() {
  if(confirm("設定をリセットします。よろしいですか？")) {
    localStorage.removeItem(SKEY_CONFIG);
    location.reload();
  }
}

// 写真アップロード（Base64保存）
function uploadPhotos(files) {
  document.getElementById('loading').classList.add('on');
  let count = 0;
  for (let f of files) {
    const reader = new FileReader();
