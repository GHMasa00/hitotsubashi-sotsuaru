<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>思い出アルバム — 千代田区立一橋中学校</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Shippori+Mincho:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>
<style>
/* ══════ 変数・リセット ══════ */
:root {
  --gold:#c9a84c; --gold-l:#e8d5a3; --gold-d:#9a7a2a;
  --bg:#1a1208; --bg2:#2a1f0e; --bg3:#3a2c14;
  --cream:#f5f0e8; --warm:#faf7f2;
  --sepia:#8b6f47; --sepia-d:#5c4a2a;
  --ink:#1a1208; --faded:#a09070;
  --red:#c05050;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{background:var(--bg);font-family:'Noto Serif JP',serif;color:var(--cream);}

/* ══════ 共通 ══════ */
.screen{display:none;min-height:100vh;}
.screen.on{display:block;}
#pwScreen.on{display:flex;}

/* ══════ ローディング ══════ */
#loading{position:fixed;inset:0;z-index:999;background:rgba(10,7,2,.9);backdrop-filter:blur(6px);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;}
#loading.on{display:flex;}
.spin{width:44px;height:44px;border:3px solid rgba(201,168,76,.2);border-top-color:var(--gold);
  border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#loadTxt{color:var(--gold-l);font-size:.9rem;letter-spacing:.08em;}

/* ══════ パスワード画面 ══════ */
#pwScreen{
  min-height:100vh;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 30% 40%, rgba(139,111,71,.15) 0%, transparent 60%),
             radial-gradient(ellipse at 70% 60%, rgba(201,168,76,.08) 0%, transparent 50%),
             var(--bg);
  padding:2rem 1.5rem;
}
.pw-line{width:80px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin-bottom:2rem;}
.pw-logo{font-family:'Shippori Mincho',serif;font-size:clamp(2rem,6vw,3rem);font-weight:800;
  color:var(--gold-l);letter-spacing:.2em;text-shadow:0 2px 20px rgba(201,168,76,.3);margin-bottom:.4rem;}
.pw-logo span{color:var(--gold);}
.pw-school{color:var(--faded);font-size:.9rem;letter-spacing:.15em;margin-bottom:2.5rem;}
.pw-field{width:100%;max-width:360px;display:flex;flex-direction:column;gap:.8rem;}
.pw-input-wrap{position:relative;}
#pwInput{
  width:100%;background:rgba(245,240,232,.08);border:1.5px solid rgba(201,168,76,.35);
  border-radius:10px;padding:.85rem 3rem .85rem 1.1rem;color:var(--cream);
  font-family:'Noto Serif JP',serif;font-size:1rem;letter-spacing:.1em;text-align:center;
  outline:none;transition:border-color .2s;
}
#pwInput:focus{border-color:var(--gold);}
#pwInput.err{border-color:var(--red);animation:shake .35s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
#pwToggle{position:absolute;right:.7rem;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;font-size:1rem;padding:.2rem;line-height:1;}
#pwEnterBtn{
  background:var(--gold);border:none;border-radius:10px;padding:.85rem;
  color:var(--bg);font-family:'Shippori Mincho',serif;font-size:1rem;font-weight:600;
  letter-spacing:.15em;cursor:pointer;transition:background .2s;
}
#pwEnterBtn:active{background:var(--gold-l);}
#pwErr{color:var(--red);font-size:.78rem;text-align:center;min-height:1.1em;}
.pw-hint{color:rgba(160,144,112,.5);font-size:.72rem;text-align:center;margin-top:.8rem;}
.pw-setup-link{
  background:none;border:none;color:rgba(160,144,112,.35);font-size:.68rem;
  cursor:pointer;font-family:sans-serif;text-decoration:underline;padding:.3rem;
  margin-top:.5rem;
}

/* ══════ Layer 1：トップ（クラス一覧） ══════ */
#topScreen{background:var(--bg);}
.top-header{
  background:linear-gradient(180deg,#1a1208 0%,#2d2010 60%,#3a2c14 100%);
  border-bottom:2px solid var(--gold);
  padding:calc(env(safe-area-inset-top) + 1.5rem) 1.5rem 1.5rem;
  text-align:center;position:sticky;top:0;z-index:100;
}
.top-header h1{
  font-family:'Shippori Mincho',serif;font-size:clamp(1.4rem,4vw,2.2rem);
  font-weight:800;color:var(--gold-l);letter-spacing:.2em;
}
.top-header h1 span{color:var(--gold);}
.top-subtitle{color:var(--faded);font-size:.78rem;letter-spacing:.15em;margin-top:.3rem;}
.top-gold-line{width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:.8rem auto 0;}
.drive-login-bar{text-align:center;padding:.6rem 1rem;background:rgba(201,168,76,0.08);border-bottom:1px solid rgba(201,168,76,0.2);}
.drive-login-btn{background:var(--gold);border:none;border-radius:4px;color:#1a1208;font-family:'Noto Serif JP',serif;font-size:.85rem;font-weight:700;padding:.5rem 1.4rem;cursor:pointer;letter-spacing:.05em;}
.drive-login-btn:hover{background:var(--gold-light);}
.drive-login-bar small{color:var(--faded);font-size:.72rem;margin-left:.6rem;}
.school-emblem{
    width:80px;height:80px;object-fit:contain;margin-bottom:.6rem;
    filter:invert(1) sepia(1) saturate(3) hue-rotate(5deg) brightness(1.1);
    opacity:.9;
    filter: brightness(0) invert(1) sepia(1) saturate(4) hue-rotate(2deg) brightness(0.9);
}

.classes-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:1.5rem;
  padding:2rem 1.5rem;
  max-width:1100px;margin:0 auto;
}

.class-card{
  background:var(--bg2);
  border:1px solid rgba(201,168,76,.2);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:transform .25s,box-shadow .25s,border-color .25s;
  animation:fadeUp .4s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.class-card:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 40px rgba(0,0,0,.5);
  border-color:rgba(201,168,76,.5);
}
.class-card:active{transform:scale(.98);}
.class-card-img{
  width:100%;aspect-ratio:16/7;overflow:hidden;
  background:var(--bg3);position:relative;
}
.class-card-img img{width:100%;height:100%;object-fit:cover;filter:sepia(10%) brightness(.95);}
.class-card-img .no-img{
  display:flex;align-items:center;justify-content:center;
  width:100%;height:100%;color:var(--faded);font-size:2rem;
}
.class-card-info{padding:.9rem 1rem;}
.class-card-num{
  font-family:'Shippori Mincho',serif;font-size:1.4rem;font-weight:800;
  color:var(--gold);letter-spacing:.1em;
}
.class-card-label{color:var(--faded);font-size:.75rem;letter-spacing:.1em;margin-top:.2rem;}

/* ══════ Layer 2：クラスページ ══════ */
#classScreen{background:var(--bg);min-height:100vh;}
.class-header{
  background:linear-gradient(180deg,#1a1208,#2d2010);
  border-bottom:1px solid rgba(201,168,76,.3);
  padding:calc(env(safe-area-inset-top) + 1rem) 1.2rem 1rem;
  display:flex;align-items:center;gap:1rem;
  position:sticky;top:0;z-index:100;
}
.back-btn{
  background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);
  border-radius:8px;padding:.4rem .8rem;color:var(--gold-l);font-size:.85rem;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.back-btn:active{background:rgba(201,168,76,.2);}
.class-header-title{
  font-family:'Shippori Mincho',serif;font-size:1.2rem;font-weight:800;
  color:var(--gold-l);letter-spacing:.1em;flex:1;
}

/* スキャン画像（見開き） */
.scan-section{padding:1.2rem 1.2rem 0;}
.scan-section h2{
  color:var(--gold);font-size:.78rem;letter-spacing:.3em;
  text-transform:uppercase;margin-bottom:.8rem;
  display:flex;align-items:center;gap:.8rem;
}
.scan-section h2::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(201,168,76,.4),transparent);}
.scan-images{
  display:flex;flex-direction:row;gap:0;
  width:100%;max-width:900px;margin:0 auto;
}
.scan-img-wrap{flex:1;overflow:hidden;}
.scan-img-wrap img{width:100%;height:auto;display:block;}
.scan-img-wrap{
  width:100%;border-radius:8px;overflow:hidden;
  border:1px solid rgba(201,168,76,.2);
  background:var(--bg3);
}
.scan-img-wrap img{width:100%;display:block;filter:sepia(5%);}

/* 個人写真グリッド */
.portraits-section{padding:1.5rem 1.2rem 4rem;}
.portraits-section h2{
  color:var(--gold);font-size:.78rem;letter-spacing:.3em;
  text-transform:uppercase;margin-bottom:1rem;
  display:flex;align-items:center;gap:.8rem;
}
.portraits-section h2::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(201,168,76,.4),transparent);}

/* 名前検索 */
.search-bar{
  display:flex;align-items:center;gap:.6rem;
  background:rgba(245,240,232,.06);border:1px solid rgba(201,168,76,.25);
  border-radius:10px;padding:.5rem .9rem;margin-bottom:1.2rem;
}
.search-bar input{
  background:none;border:none;color:var(--cream);font-family:'Noto Serif JP',serif;
  font-size:.9rem;outline:none;flex:1;
}
.search-bar input::placeholder{color:rgba(160,144,112,.4);}

.portraits-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:1rem;
}
.portrait-card{
  background:var(--warm);border-radius:8px;overflow:hidden;
  cursor:pointer;transition:transform .2s,box-shadow .2s;
  box-shadow:0 2px 12px rgba(0,0,0,.3);
  border:2px solid var(--warm);
}
.portrait-card:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,.4);border-color:var(--gold);}
.portrait-card:active{transform:scale(.97);}
.portrait-img{width:100%;aspect-ratio:5/6;overflow:hidden;background:#d4c9b0;}
.portrait-img img{width:100%;height:100%;object-fit:cover;display:block;filter:sepia(10%) contrast(.95);}
.portrait-img .ph{
  width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;color:var(--faded);font-size:.7rem;gap:.3rem;
}
.portrait-info{padding:.45rem .5rem .5rem;background:var(--warm);}
.portrait-name{font-family:'Shippori Mincho',serif;font-size:.85rem;font-weight:600;
  color:var(--sepia-d);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.portrait-nick{font-size:.68rem;color:var(--faded);text-align:center;font-style:italic;}

/* ══════ Layer 3：個人モーダル ══════ */
#personModal{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(10,7,2,.9);backdrop-filter:blur(10px);
  align-items:center;justify-content:center;padding:1.5rem;
}
#personModal.on{display:flex;}
.person-card{
  background:var(--warm);border-radius:16px;
  max-width:420px;width:100%;
  box-shadow:0 30px 80px rgba(0,0,0,.7);
  border:1px solid rgba(201,168,76,.3);
  animation:popIn .3s cubic-bezier(.34,1.4,.64,1);
  overflow:hidden;
}
@keyframes popIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
.person-photo{
  width:100%;aspect-ratio:5/4;overflow:hidden;
  background:#d4c9b0;
}
.person-photo img{width:100%;height:100%;object-fit:cover;filter:sepia(8%) contrast(.97);}
.person-body{padding:1.5rem 1.5rem 1.2rem;}
.person-name-wrap{margin-bottom:.3rem;}
.person-name{
  font-family:'Shippori Mincho',serif;font-size:1.6rem;font-weight:800;
  color:var(--sepia-d);letter-spacing:.1em;
}
.person-nick{
  display:inline-block;
  background:rgba(139,111,71,.12);border:1px solid rgba(139,111,71,.3);
  border-radius:20px;padding:.2rem .8rem;
  font-size:.8rem;color:var(--sepia);font-style:italic;
  margin-top:.4rem;
}
.person-class{
  font-size:.75rem;color:var(--faded);letter-spacing:.1em;margin-top:.5rem;
}
.person-close{
  display:block;width:100%;margin-top:1rem;
  background:var(--gold);border:none;border-radius:8px;padding:.7rem;
  font-family:'Shippori Mincho',serif;font-size:.95rem;font-weight:600;
  color:var(--bg);cursor:pointer;transition:background .2s;letter-spacing:.1em;
}
.person-close:active{background:var(--gold-l);}

/* ══════ スワイプ閉じ ══════ */
#personModal .person-card{touch-action:none;}

/* ══════ レスポンシブ ══════ */
@media(max-width:480px){
  .classes-grid{grid-template-columns:1fr 1fr;gap:1rem;padding:1.2rem 1rem;}
  .portraits-grid{grid-template-columns:repeat(3,1fr);gap:.7rem;}
  .person-name{font-size:1.3rem;}
}
</style>
</head>

window.addEventListener('load', () => {
  config = loadConfig();
  loadCache();


  if (!config) {
    // 設定なし → DriveからConfigを読み込み試みる
    showScreen('pwScreen');
    $('pwSchoolName').textContent = '読み込み中...';
    initGAPI();
    const tryLoad = async () => {
      let retries = 0;
      while ((!gapiReady || !gisReady) && retries < 20) {
        await new Promise(r => setTimeout(r, 300));
        retries++;
      }
      if (gapiReady && gisReady) {
        tokenClient.requestAccessToken({ prompt: '' });
      } else {
        location.href = './setup.html';
      }
    };
    tryLoad();
  } else {
    showScreen('pwScreen');
    $('pwSchoolName').textContent = `${config.schoolName} ${config.year}`;
    initGAPI();
  }
});

// パスワード認証
// ══════════════════════════════════════════════════════
$('pwEnterBtn').onclick = $('pwInput').onkeydown = function(e) {
  if (e.type === 'keydown' && e.key !== 'Enter') return;
  const v = $('pwInput').value.trim();
  if (v === config?.viewPw || v === config?.adminPw) {
    $('pwInput').value = '';
    enterAlbum();
  } else {
    const el = $('pwInput');
    el.classList.add('err');
    $('pwErr').textContent = 'パスワードが違います';
    setTimeout(() => { el.classList.remove('err'); el.value = ''; }, 900);
  }
};

async function enterAlbum() {
  showScreen('topScreen');
  $('topSchoolName').textContent = `${config.schoolName} ${config.year}`;
  initGAPIIfNeeded();
  renderTopPage();

  if (accessToken) {
    // すでに認証済み → 即同期
    await syncFromDrive();
    renderTopPage();
  } else {
    // GISが準備できたらボタン表示（ユーザーが直接クリックしてもらう）
    const waitAndShow = async () => {
      let r = 0;
      while (!gisReady && r < 20) { await new Promise(x => setTimeout(x, 300)); r++; }
      if (gisReady) $('driveLoginBar').style.display = 'block';
    };
    waitAndShow();
  }
}

// Driveログインボタン（ユーザーが直接クリック → ポップアップ許可される）
$('driveLoginBtn').onclick = () => {
  if (!tokenClient) { initGAPI(); setTimeout(() => tokenClient?.requestAccessToken({prompt:'consent'}), 1000); return; }
  tokenClient.requestAccessToken({prompt: 'consent'});
};

function initGAPI() {
  if (GAPI_CLIENT_ID.includes('★')) return;
  gapi.load('client', async () => {
    await gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
    gapiReady = true;
  });
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GAPI_CLIENT_ID, scope: SCOPES,
    callback: async (r) => {
      if (r.error) {
        if (!config && $('pwScreen').classList.contains('on')) location.href = './setup.html';
        return;
      }
      accessToken = r.access_token;
      gapi.client.setToken({ access_token: accessToken });
      $('driveLoginBar').style.display = 'none';
      if ($('pwScreen').classList.contains('on') && !config) {
        load('設定を読み込み中...');
        try {
          const cfgId = await findFile(CONFIG_FILE);
          if (cfgId) {
            const raw = await dlFile(cfgId);
            config = JSON.parse(raw);
            saveConfig(config);
            $('pwSchoolName').textContent = `${config.schoolName} ${config.year}`;
          } else { location.href = './setup.html'; }
        } catch { location.href = './setup.html'; }
        finally { unload(); }
      } else if ($('topScreen').classList.contains('on')) {
        // トップ画面でログイン完了 → 同期開始
        await syncFromDrive();
        renderTopPage();
      }
    },
  });
  gisReady = true;
}
function initGAPIIfNeeded() { if (!gapiReady) initGAPI(); }

// ── Drive操作 ──
async function findFile(name, pid = DRIVE_FOLDER_ID) {
  const q = `name='${name}' and '${pid}' in parents and trashed=false`;
  const r = await gapi.client.drive.files.list({ q, fields: 'files(id)', spaces: 'drive' });
  return r.result.files[0]?.id || null;
}
async function dlFile(id) {
  const r = await gapi.client.drive.files.get({ fileId: id, alt: 'media' });
  return typeof r.body === 'string' ? r.body : JSON.stringify(r.result);
}
async function dlDataUrl(id) {
  return new Promise((res, rej) => {
    const x = new XMLHttpRequest();
    x.open('GET', `https://www.googleapis.com/drive/v3/files/${id}?alt=media`);
    x.setRequestHeader('Authorization', 'Bearer ' + accessToken);
    x.responseType = 'blob';
    x.onload = () => { const r = new FileReader(); r.onload = e => res(e.target.result); r.onerror = rej; r.readAsDataURL(x.response); };
    x.onerror = rej; x.send();
  });
}
async function mkFolder(name, pid) {
  const q = `name='${name}' and '${pid}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`;
  const r = await gapi.client.drive.files.list({ q, fields: 'files(id)', spaces: 'drive' });
  if (r.result.files[0]) return r.result.files[0].id;
  const c = await gapi.client.drive.files.create({ resource: { name, mimeType: 'application/vnd.google-apps.folder', parents: [pid] }, fields: 'id' });
  return c.result.id;
}

// ── Drive同期 ──
async function syncFromDrive() {
  try {
    // configをDriveから取得
    const cfgId = await findFile(CONFIG_FILE);
    if (cfgId) {
      const raw = await dlFile(cfgId);
      config = { ...config, ...JSON.parse(raw) };
      saveConfig(config);
    }
    // データ取得
    const dfId = await findFile(DATA_FILE);
    if (dfId) { const raw = await dlFile(dfId); const d = JSON.parse(raw); photos = d.photos || []; }

    // ── photosフォルダ（個人ポートレート）取得 ──
    // photos/photosという二重フォルダ構造に対応
    let pfId = await findDriveFolder('photos');
    if (pfId) {
      // その中にさらにphotosフォルダがあれば、そちらを使う
      const innerPfId = await findDriveFolderIn('photos', pfId);
      if (innerPfId) pfId = innerPfId;
    }
    if (pfId) {
      const res = await gapi.client.drive.files.list({
        q: `'${pfId}' in parents and trashed=false and mimeType contains 'image/'`,
        fields: 'files(id,name)', spaces: 'drive', pageSize: 300
      });
      for (const df of res.result.files || []) {
        if (!photos.find(p => p.driveId === df.id)) {
          // ファイル名（例：3年1組_浅野大輔.jpg）からクラスを自動判定
          // ファイル名「3年X組_名前.jpg」からクラスを抽出
          const clsMatch = df.name.match(/^(3年[1-7]組)/);
          const cls = clsMatch ? clsMatch[1] : '';
          // ファイル名から名前・あだ名を自動設定
          const baseKey = df.name.replace(/\.[^.]+$/, ''); // 拡張子除去
          const nameData = NAME_MAP[baseKey] || {};
          photos.push({ id: 'dr_'+df.id, name: nameData.name||'', nick: nameData.nick||'', cls, cmt: '', type: 'graduation', driveId: df.id, drvName: df.name, url: null });
        }
      }
    }
    // ── scansフォルダ（見開きスキャン画像）取得 ──
    const scanFid = await findDriveFolder('scans');
    if (scanFid) {
      const sRes = await gapi.client.drive.files.list({
        q: `'${scanFid}' in parents and trashed=false`,
        fields: 'files(id,name)', spaces: 'drive', pageSize: 100
      });
      for (const sf of sRes.result.files || []) {
        if (!photos.find(p => p.driveId === sf.id)) {
          photos.push({ id: 'sc_'+sf.id, name: sf.name, nick: '', cls: '', type: 'scan', driveId: sf.id, drvName: sf.name, url: null });
        }
      }
    }
    // ── thumbnailsフォルダ（集合写真サムネ）取得 ──
    const thumbFid = await findDriveFolder('thumbnails');
    if (thumbFid) {
      const tRes = await gapi.client.drive.files.list({
        q: `'${thumbFid}' in parents and trashed=false`,
        fields: 'files(id,name)', spaces: 'drive', pageSize: 50
      });
      for (const tf of tRes.result.files || []) {
        if (!photos.find(p => p.driveId === tf.id)) {
          photos.push({ id: 'th_'+tf.id, name: tf.name, nick: '', cls: '', type: 'thumbnail', driveId: tf.id, drvName: tf.name, url: null });
        }
      }
    }
    // ── 画像URLを設定（Drive APIの直接URLを使用・高速）──
    // サムネイル・スキャンはbase64、ポートレートはDrive直接URL
    const thumbsAndScans = photos.filter(p => p.driveId && !p.url && (p.type === 'thumbnail' || p.type === 'scan'));
    const portraits = photos.filter(p => p.driveId && !p.url && p.type === 'graduation');

    // サムネイルとスキャンのみダウンロード（枚数少ない）
    load(`画像を読み込み中... 0/${thumbsAndScans.length}`);
    let done = 0;
    const CONCURRENCY = 5;
    for (let i = 0; i < thumbsAndScans.length; i += CONCURRENCY) {
      const batch = thumbsAndScans.slice(i, i + CONCURRENCY);
      await Promise.all(batch.map(async p => {
        p.url = await dlDataUrl(p.driveId);
        done++;
        load(`画像を読み込み中... ${done}/${thumbsAndScans.length}`);
      }));
    }

    // ポートレートはGoogleドライブのサムネイルURLを使用
    // （認証不要・高速）
    portraits.forEach(p => {
      p.url = `https://drive.google.com/thumbnail?id=${p.driveId}&sz=w400`;
    });

    saveCache();
  } catch (e) { console.error('Drive同期エラー:', e); }
  finally { unload(); }
}

async function findDriveFolder(name) {
  try {
    const q = `name='${name}' and '${DRIVE_FOLDER_ID}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`;
    const r = await gapi.client.drive.files.list({ q, fields: 'files(id)', spaces: 'drive' });
    return r.result.files[0]?.id || null;
  } catch { return null; }
}

async function findDriveFolderIn(name, parentId) {
  try {
    const q = `name='${name}' and '${parentId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`;
    const r = await gapi.client.drive.files.list({ q, fields: 'files(id)', spaces: 'drive' });
    return r.result.files[0]?.id || null;
  } catch { return null; }
}

// ══════════════════════════════════════════════════════
// Layer 1：トップページ
// ══════════════════════════════════════════════════════
function renderTopPage() {
  const grid = $('classesGrid');
  grid.innerHTML = '';
  CLASSES.forEach((cls, i) => {
    // この クラスの集合写真サムネを探す
    // thumbnailsフォルダの画像を優先、なければスキャン画像
    const thumbPhoto = photos.find(p =>
      p.type === 'thumbnail' && p.drvName && p.drvName.includes(cls.id)
    );
    const scanPhoto = photos.find(p =>
      p.type === 'scan' && p.drvName && p.drvName.includes(cls.id)
    );
    const imgSrc = thumbPhoto?.url || scanPhoto?.url || '';

    const card = document.createElement('div');
    card.className = 'class-card';
    card.style.animationDelay = `${i * 0.06}s`;
    card.innerHTML = `
      <div class="class-card-img">
        ${imgSrc
          ? `<img src="${imgSrc}" alt="${cls.label}">`
          : `<div class="no-img">📸</div>`}
      </div>
      <div class="class-card-info">
        <div class="class-card-num">${cls.label}</div>
        <div class="class-card-label">${getClassMemberCount(cls.id)}人のクラスメート</div>
      </div>`;
    card.onclick = () => openClass(cls);
    grid.appendChild(card);
  });
}

function getClassMemberCount(clsId) {
  return photos.filter(p => p.type === 'graduation' && (p.cls === clsId || (p.drvName && p.drvName.startsWith(clsId + '_')))).length;
}

// ══════════════════════════════════════════════════════
// Layer 2：クラスページ
// ══════════════════════════════════════════════════════
function openClass(cls) {
  currentClass = cls;
  $('classHeaderTitle').textContent = cls.label;
  showScreen('classScreen');

  // スクロールをトップに戻す
  $('classScreen').scrollTop = 0;

  renderScanImages(cls);
  renderPortraits(cls);
}

function renderScanImages(cls) {
  const container = $('scanImages');
  container.innerHTML = '';

  // -01を左、-02を右に固定して見開き表示
  const scanPhotos = photos.filter(p =>
    p.type === 'scan' && p.drvName && p.drvName.includes(cls.id)
  );
  // ファイル名で昇順ソート（_01が左、_02が右）
  scanPhotos.sort((a, b) => a.drvName.localeCompare(b.drvName));

  scanPhotos.forEach(photo => {
    if (photo?.url) {
      const wrap = document.createElement('div');
      wrap.className = 'scan-img-wrap';
      const img = document.createElement('img');
      img.src = photo.url;
      img.alt = photo.drvName;
      img.loading = 'lazy';
      wrap.appendChild(img);
      container.appendChild(wrap);
    }
  });

  if (!container.children.length) {
    container.innerHTML = '<p style="color:var(--faded);font-size:.8rem;padding:.5rem">スキャン画像を読み込み中...</p>';
  }
}

function renderPortraits(cls, query = '') {
  const grid = $('portraitsGrid');
  const members = photos.filter(p => {
    if (p.type === 'scan') return false;
    // クラス一致（cls列 or ファイル名でマッチ）
    const inClass = p.type === 'graduation' && (
      p.cls === cls.id ||
      (p.drvName && p.drvName.startsWith(cls.id + '_')) ||
      (p.drvName && p.drvName.includes('_') && p.drvName.split('_')[0] === cls.id)
    );
    if (!inClass) return false;
    if (!query) return true;
    return (p.name || '').includes(query) || (p.nick || '').includes(query);
  });

  grid.innerHTML = '';
  if (!members.length) {
    grid.innerHTML = '<p style="color:var(--faded);font-size:.8rem;grid-column:1/-1">写真がありません</p>';
    return;
  }

  members.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'portrait-card';
    card.style.animationDelay = `${Math.min(i, 20) * 0.03}s`;
    card.innerHTML = `
      <div class="portrait-img">
        ${p.url || p.edited
          ? `<img src="${p.edited || p.url}" alt="${p.name || ''}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : ''}
        <div class="ph" style="${p.url || p.edited ? 'display:none' : ''}"><span style="font-size:1.8rem">📷</span><span>${p.url ? 'エラー' : '読込中'}</span></div>
      </div>
      <div class="portrait-info">
        <div class="portrait-name">${p.name || '未登録'}</div>
        ${p.nick ? `<div class="portrait-nick">「${p.nick}」</div>` : ''}
      </div>`;
    card.onclick = () => openPerson(p);
    grid.appendChild(card);
  });
}

// 検索
$('portraitSearch').oninput = e => {
  if (currentClass) renderPortraits(currentClass, e.target.value.trim());
};

// 戻るボタン
$('backBtn').onclick = () => {
  showScreen('topScreen');
  currentClass = null;
  $('portraitSearch').value = '';
};

// ══════════════════════════════════════════════════════
// Layer 3：個人モーダル
// ══════════════════════════════════════════════════════
function openPerson(p) {
  $('personImg').src = p.edited || p.url || '';
  $('personName').textContent = p.name || '未登録';
  const nickEl = $('personNick');
  if (p.nick) { nickEl.textContent = `「${p.nick}」`; nickEl.style.display = 'inline-block'; }
  else { nickEl.style.display = 'none'; }
  $('personClass').textContent = p.cls || currentClass?.label || '';
  $('personModal').classList.add('on');
}

function closeModal() {
  $('personModal').classList.remove('on');
}

// モーダル外クリックで閉じる
$('personModal').onclick = e => {
  if (e.target === $('personModal')) closeModal();
};

// スワイプで閉じる
let touchStartY = null;
$('personCard').addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
$('personCard').addEventListener('touchend', e => {
  if (touchStartY === null) return;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy > 80) closeModal();
  touchStartY = null;
}, { passive: true });

// キーボード
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if ($('personModal').classList.contains('on')) closeModal();
    else if ($('classScreen').classList.contains('on')) { showScreen('topScreen'); currentClass = null; }
  }
});

// ══════════════════════════════════════════════════════
// ストレージ
// ══════════════════════════════════════════════════════
function saveConfig(cfg) { localStorage.setItem(SKEY_CONFIG, JSON.stringify(cfg)); }
function loadConfig() {
  try { const r = localStorage.getItem(SKEY_CONFIG); return r ? JSON.parse(r) : null; } catch { return null; }
}
function saveCache() {
  try { localStorage.setItem(SKEY_DATA, JSON.stringify(photos)); } catch {}
}
function loadCache() {
  try { const r = localStorage.getItem(SKEY_DATA); if (r) photos = JSON.parse(r); } catch { photos = []; }
}
</script>
